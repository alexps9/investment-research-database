<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Systems Evolution Map</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function LLMEvolutionMap() {
      const lanes = [
        {
          id: 1,
          title: 'Context Scaling',
          subtitle: '处理更长文本（4K → 1M+）',
          border: 'border-blue-500',
          paradigms: [
            {
              name: 'Linear / SSM',
              subtitle: '线性/状态空间',
              color: 'bg-blue-500',
              shape: 'circle',
              papers: [['RetNet', '2023 Q2', '12%', 'sm'], ['RWKV v6', '2023 Q2', '22%', 'md'], ['Mamba', '2023 Q4', '42%', 'lg'], ['Mamba-2', '2024 Q2', '60%', 'lg'], ['Mamba-3', '2024 Q4', '80%', 'md']],
            },
            {
              name: 'Sparse / Chunked',
              subtitle: '稀疏/分块',
              color: 'bg-teal-500',
              shape: 'square',
              papers: [['LongNet', '2023 Q1', '10%', 'sm'], ['Ring Attention', '2023 Q3', '30%', 'md'], ['Infini-Attention', '2024 Q1', '48%', 'md'], ['YaRN', '2024 Q3', '68%', 'md'], ['LongRoPE', '2024 Q4', '80%', 'md'], ['Llama-3.1 128K', '2025 Q1', '92%', 'lg']],
            },
            {
              name: 'Memory-Augmented',
              subtitle: '记忆增强',
              color: 'bg-violet-500',
              shape: 'hex',
              papers: [['RETRO', '2023 Q2', '18%', 'md'], ['HMT', '2023 Q4', '42%', 'sm'], ['MemGPT', '2024 Q2', '64%', 'md'], ['RMT', '2024 Q4', '88%', 'sm']],
            },
            {
              name: 'Kernel Optimization',
              subtitle: '内核/IO 优化',
              color: 'bg-slate-500',
              shape: 'square',
              papers: [['FlashAttention', '2023 Q2', '20%', 'lg'], ['FlashAttn-2', '2023 Q3', '42%', 'lg'], ['FlashAttn-3', '2024 Q2', '64%', 'md'], ['FlashAttn-4', '2025 Q1', '90%', 'md']],
            },
          ],
        },
        {
          id: 2,
          title: 'Memory Wall',
          subtitle: '降低推理显存 / 带宽占用',
          border: 'border-emerald-500',
          paradigms: [
            {
              name: 'KV Compression',
              subtitle: 'KV 压缩',
              color: 'bg-slate-500',
              shape: 'hex',
              papers: [['MQA', '2023 Q1', '8%', 'sm'], ['GQA', '2023 Q2', '22%', 'md'], ['MLA (DS-V2)', '2024 Q2', '60%', 'lg'], ['MLA (DS-V3)', '2024 Q4', '78%', 'lg'], ['TransMLA', '2025 Q1', '90%', 'md']],
            },
            {
              name: 'Paging / Offloading',
              subtitle: '分页/卸载',
              color: 'bg-slate-400',
              shape: 'square',
              papers: [['PagedAttention', '2023 Q2', '18%', 'lg'], ['vLLM v1', '2023 Q4', '42%', 'md'], ['vLLM v2', '2024 Q3', '70%', 'md'], ['PyramidKV', '2024 Q4', '84%', 'sm']],
            },
            {
              name: 'Quantization',
              subtitle: '量化',
              color: 'bg-slate-400',
              shape: 'circle',
              papers: [['AWQ', '2023 Q2', '18%', 'md'], ['GPTQ', '2023 Q3', '30%', 'md'], ['SmoothQuant', '2023 Q4', '42%', 'md'], ['FP8 (H100)', '2024 Q2', '60%', 'md'], ['INT4 (Edge)', '2024 Q4', '80%', 'sm']],
            },
          ],
        },
        {
          id: 3,
          title: 'Compute Allocation',
          subtitle: '有限算力下的最优分配',
          border: 'border-orange-500',
          paradigms: [
            {
              name: 'MoE / Routing',
              subtitle: '条件计算',
              color: 'bg-red-500',
              shape: 'circle',
              papers: [['GShard', '2023 Q1', '8%', 'md'], ['Switch Transformer', '2023 Q2', '22%', 'lg'], ['Mixtral 8x7B', '2023 Q4', '42%', 'lg'], ['DeepSeek-MoE', '2024 Q2', '60%', 'md'], ['DeepSeek-V3', '2024 Q4', '80%', 'lg'], ['Qwen3 (MoE)', '2025 Q1', '92%', 'md']],
            },
            {
              name: 'Speculative / Draft',
              subtitle: '推测解码',
              color: 'bg-red-400',
              shape: 'diamond',
              papers: [['Speculative Decoding', '2023 Q2', '16%', 'lg'], ['Medusa', '2023 Q4', '40%', 'md'], ['Lookahead Decoding', '2024 Q2', '58%', 'sm'], ['EAGLE', '2024 Q3', '74%', 'md']],
            },
            {
              name: 'Reasoning Scaling',
              subtitle: '推理缩放',
              color: 'bg-orange-500',
              shape: 'triangle',
              papers: [['Chain-of-Thought', '2023 Q1', '10%', 'lg'], ['o1-preview', '2024 Q4', '76%', 'lg'], ['DeepSeek-R1', '2025 Q1', '88%', 'lg'], ['Verifier / Rubric', '2025 Q2', '96%', 'sm']],
            },
          ],
        },
      ];

      const [selectedPaper, setSelectedPaper] = useState(null);

      const renderShape = (shape, color, size) => {
        const s = size === 'lg' ? 'w-7 h-7' : size === 'sm' ? 'w-4 h-4' : 'w-5 h-5';
        if (shape === 'square') {
          return <div className={`${s} ${color} border-2 border-white shadow-md`} />;
        }
        if (shape === 'diamond') {
          return <div className={`${s} rotate-45 ${color} border-2 border-white shadow-md`} />;
        }
        if (shape === 'triangle') {
          const bs = size === 'lg' ? 'border-l-[12px] border-r-[12px] border-b-[22px]' : size === 'sm' ? 'border-l-[7px] border-r-[7px] border-b-[13px]' : 'border-l-[10px] border-r-[10px] border-b-[18px]';
          return <div className={`w-0 h-0 ${bs} border-l-transparent border-r-transparent border-b-orange-500`} />;
        }
        if (shape === 'hex') {
          return <div className={`${s} ${color} shadow-md`} style={{ clipPath: 'polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%)' }} />;
        }
        return <div className={`${s} rounded-full ${color} border-2 border-white shadow-md`} />;
      };

      return (
        <div className="bg-white min-h-screen text-zinc-900 flex font-sans">
          <div className="flex-1 overflow-auto">
            <div className="sticky top-0 z-30 bg-white border-b border-zinc-200 px-8 py-5 flex items-center justify-between">
              <div>
                <h1 className="text-4xl font-black tracking-tight">LLM SYSTEMS EVOLUTION MAP</h1>
                <p className="mt-1 text-sm text-zinc-500">后 Transformer 时代技术演化地图（2023 → 2026）</p>
              </div>
              <div className="flex items-center gap-3 text-sm">
                <button className="px-4 py-2 rounded-xl bg-orange-500 text-white font-semibold">全局视图</button>
                <button className="px-4 py-2 rounded-xl border border-zinc-300 text-zinc-600">单一主题</button>
                <button className="px-4 py-2 rounded-xl border border-zinc-300 text-zinc-600">对比视图</button>
              </div>
            </div>

            <div className="px-8 py-6">
              <div className="grid grid-cols-[250px_1fr] border border-zinc-200 rounded-3xl overflow-hidden">
                <div className="bg-zinc-50 border-r border-zinc-200">
                  <div className="h-24 border-b border-zinc-200 px-6 flex items-center text-xs uppercase tracking-[0.2em] text-zinc-500 font-bold">
                    Bottleneck / Pressure Axis
                  </div>
                  {lanes.map((lane) => (
                    <div key={lane.id} className={`border-l-4 ${lane.border} border-b border-zinc-200 px-6 py-10 min-h-[420px]`}>
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-white border border-zinc-300 flex items-center justify-center text-sm font-bold">
                          {lane.id}
                        </div>
                        <h2 className="text-2xl font-bold">{lane.title}</h2>
                      </div>
                      <p className="mt-4 text-sm text-zinc-500 leading-7">{lane.subtitle}</p>
                    </div>
                  ))}
                </div>

                <div className="relative overflow-hidden bg-white">
                  <div className="h-24 border-b border-zinc-200 sticky top-0 z-20 bg-white flex">
                    {['2023', '2024', '2025', '2026'].map((year) => (
                      <div key={year} className="flex-1 border-r border-zinc-100">
                        <div className="text-center text-lg font-bold text-zinc-700 pt-2">{year}</div>
                        <div className="grid grid-cols-4 h-8">
                          {['Q1','Q2','Q3','Q4'].map((q) => (
                            <div key={q} className="text-[10px] text-zinc-400 text-center border-r border-zinc-50">{q}</div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="absolute top-0 bottom-0 left-[78%] border-l-2 border-dashed border-orange-400 z-10">
                    <div className="absolute top-6 -left-4 text-xs font-bold text-orange-500">NOW</div>
                  </div>

                  {/* Pressure Wave: Test-time scaling */}
                  <div className="absolute top-[68%] left-[60%] right-[5%] h-36 bg-slate-50 border border-slate-100 pointer-events-none flex items-start pl-3 pt-1">
                    <span className="text-[9px] text-slate-400 font-medium">Test-time scaling wave (2024 Q3–2025 Q2)</span>
                  </div>

                  {lanes.map((lane, laneIndex) => (
                    <div key={laneIndex} className="border-b border-zinc-200 min-h-[420px] relative">
                      {lane.paradigms.map((p, idx) => (
                        <div key={idx} className="relative h-24 border-b border-dashed border-zinc-100">
                          <div className="absolute left-5 top-3 flex items-center gap-2 text-sm font-semibold text-zinc-700 z-10">
                            <div className={`w-2.5 h-2.5 rounded-full ${p.color}`} />
                            {p.name}
                            {p.subtitle && <span className="text-[10px] text-zinc-400 font-normal">({p.subtitle})</span>}
                          </div>
                          {/* Connection line between papers */}
                          <svg className="absolute top-[40px] left-0 w-full h-[8px]" style={{zIndex: 1, pointerEvents: 'none'}}>
                            <defs>
                              <marker id="arr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
                                <polygon points="0 0, 6 2, 0 4" fill="#a1a1aa" />
                              </marker>
                            </defs>
                            {p.papers.slice(0, -1).map((paper, i) => {
                              const x1 = parseFloat(paper[2]);
                              const x2 = parseFloat(p.papers[i+1][2]);
                              return (
                                <line key={i} x1={`${x1}%`} y1="4" x2={`${x2}%`} y2="4"
                                  stroke="#a1a1aa" strokeWidth="1.5"
                                  markerEnd="url(#arr)" />
                              );
                            })}
                          </svg>
                          {p.papers.map((paper, i) => (
                            <div 
                              key={i} 
                              className="absolute top-8 -translate-x-1/2 group cursor-pointer" 
                              style={{ left: paper[2] }}
                              onClick={() => setSelectedPaper({...paper, paradigm: p.name, lane: lane.title})}
                            >
                              <div className="transition-transform duration-200 group-hover:scale-125">
                                {renderShape(p.shape, p.color, paper[3])}
                              </div>
                              <div className="mt-2 text-[11px] whitespace-nowrap text-center text-zinc-600">
                                <div>{paper[0]}</div>
                                <div className="text-zinc-400">{paper[1]}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>

              {/* Bottom Legend */}
              <div className="mt-6 flex items-center justify-between px-2 text-xs text-zinc-500">
                <div className="flex items-center gap-6">
                  <span className="font-semibold text-zinc-700">连接线图例</span>
                  <span className="flex items-center gap-1.5">
                    <svg width="30" height="8"><line x1="0" y1="4" x2="28" y2="4" stroke="#a1a1aa" strokeWidth="1.5" markerEnd="url(#legend-arrow)"/><defs><marker id="legend-arrow" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="#a1a1aa"/></marker></defs></svg>
                    builds_on（技术演进）
                  </span>
                  <span className="flex items-center gap-1.5">
                    <svg width="30" height="8"><line x1="0" y1="4" x2="28" y2="4" stroke="#9ca3af" strokeWidth="1" strokeDasharray="4,3"/></svg>
                    competes_with（竞争关系）
                  </span>
                  <span className="flex items-center gap-1.5">
                    <svg width="30" height="8"><line x1="0" y1="4" x2="28" y2="4" stroke="#d1d5db" strokeWidth="0.8" strokeDasharray="8,6"/></svg>
                    philosophical_lineage（哲学血缘）
                  </span>
                </div>
                <div className="flex items-center gap-6">
                  <span className="font-semibold text-zinc-700">Layer 图例（形状）</span>
                  <span className="flex items-center gap-1">
                    <div className="w-3 h-3 rounded-full bg-zinc-400" /> arch（架构）
                  </span>
                  <span className="flex items-center gap-1">
                    <div className="w-3 h-3 bg-zinc-400" /> sys（系统）
                  </span>
                  <span className="flex items-center gap-1">
                    <div className="w-3 h-3 rotate-45 bg-zinc-400" /> infer（推理）
                  </span>
                  <span className="flex items-center gap-1">
                    <div className="w-0 h-0 border-l-[5px] border-r-[5px] border-b-[9px] border-l-transparent border-r-transparent border-b-zinc-400" /> train（训练）
                  </span>
                  <span className="flex items-center gap-1">
                    <div className="w-3 h-3 bg-zinc-400" style={{ clipPath: 'polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%)' }} /> memory（记忆）
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-zinc-400">节点大小 = log(cited_by_count)</span>
                  <div className="flex items-center gap-1">
                    <div className="w-2 h-2 rounded-full bg-zinc-300" />
                    <div className="w-3 h-3 rounded-full bg-zinc-300" />
                    <div className="w-4 h-4 rounded-full bg-zinc-300" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <aside className={`w-[420px] bg-zinc-50 border-l border-zinc-200 p-6 overflow-auto transition-all ${selectedPaper ? 'translate-x-0' : 'translate-x-full hidden'}`}>
            {selectedPaper && (
              <>
                <div className="flex items-center justify-between">
                  <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold">
                    {selectedPaper.lane}
                  </div>
                  <button className="text-zinc-400 text-xl" onClick={() => setSelectedPaper(null)}>×</button>
                </div>

                <h2 className="mt-5 text-4xl font-black tracking-tight">{selectedPaper[0]}</h2>

                <div className="mt-3 flex items-center gap-4 text-sm text-zinc-500">
                  <span>{selectedPaper[1]}</span>
                  <span>arXiv</span>
                </div>

                <div className="mt-8 space-y-8">
                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-zinc-400 font-bold">Paradigm</div>
                    <div className="mt-3 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-sm font-medium">
                      <div className="w-2 h-2 rounded-full bg-blue-500" />
                      {selectedPaper.paradigm}
                    </div>
                  </div>

                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-zinc-400 font-bold">Competes With</div>
                    <div className="mt-3 flex flex-wrap gap-2">
                      {['Infini-Attention', 'RWKV', 'RetNet'].map((x) => (
                        <div key={x} className="px-3 py-1 rounded-full border border-zinc-300 text-sm bg-white text-zinc-700">
                          {x}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-zinc-400 font-bold">Philosophical Lineage</div>
                    <div className="mt-3 flex flex-wrap gap-2">
                      {['Hyena', 'xLSTM', 'RWKV'].map((x) => (
                        <div key={x} className="px-3 py-1 rounded-full bg-zinc-200 text-sm text-zinc-700">
                          {x}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-zinc-400 font-bold">核心洞察</div>
                    <div className="mt-3 p-4 rounded-2xl bg-white border border-zinc-200 text-sm leading-7 text-zinc-700">
                      {selectedPaper[0]} 代表了{selectedPaper.lane}方向的重要进展，通过技术创新推动了整个领域的进步。
                    </div>
                  </div>
                </div>
              </>
            )}
          </aside>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LLMEvolutionMap />);
  </script>
</body>
</html>
