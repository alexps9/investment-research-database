          if (n <= 1) { offsets[ids[0]] = 0; return; }

          const spread = 4.5; // percent of lane height
          sorted.forEach((id, i) => {
            offsets[id] = (i - (n - 1) / 2) * spread;
          });
        });
        return offsets;

          <div className="flex-1 flex flex-col relative">
            <header className="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-black/40 backdrop-blur-xl z-20">
              <div className="flex items-center space-x-4">
                <h1 className="text-[11px] font-black tracking-[0.2em] text-slate-500 uppercase">HH Intelligence · 技术演化雷达 2026</h1>
                <div className="h-4 w-px bg-white/10"></div>
                <span className="text-xs text-blue-400 font-mono">Current Sample: N=30 Critical Nodes</span>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2">
                  {['all', 0, 1, 2, 3].map((lane, i) => (
                    <button
                      key={lane}
                      onClick={() => setSelectedLane(lane)}
                      className={`px-3 py-1.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all ${
                        selectedLane === lane 
                          ? 'bg-white text-black' 
                          : 'bg-white/5 text-slate-500 hover:bg-white/10 hover:text-slate-300'
                      }`}
                    >
                      {lane === 'all' ? 'All' : lanes[lane].title.split(' ')[0]}
                    </button>
                  ))}
                </div>
                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500 ml-4">
                  <div className="w-4 h-4 rounded-full bg-blue-500"></div> TIER 1
                </div>
                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500">
                  <div className="w-4 h-4 rounded-full border-2 border-slate-600"></div> TIER 2
                </div>
              </div>
            </header>

            <div className="flex-1 relative bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:60px_60px] overflow-auto">
              <div className="absolute inset-0 pointer-events-none">
                {lanes.map((lane, i) => (
                  <div key={i} className="h-1/4 border-b border-white/5 relative">
                    <span className="absolute left-10 top-4 text-[10px] font-black text-slate-800 uppercase tracking-[0.3em]">{lane.title}</span>
                  </div>
                ))}
              </div>

              <div className="absolute inset-0 flex pointer-events-none">
                {[2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024].map((year) => (
                  <div key={year} className="flex-1 border-r border-white/5 relative">
                    <span className="absolute bottom-8 left-4 text-[11px] font-mono text-slate-800">{year}</span>
                  </div>
                ))}
              </div>

              <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ minWidth: '1400px', padding: '6rem' }}>
                {filteredPapers.map((paper) => {
                  const pos = getPaperPos(paper);
                  return paper.connections.map(connId => {
                    const targetPaper = allPapers.find(p => p.id === connId);
                    if (!targetPaper || !filteredPapers.includes(targetPaper)) return null;
                    const targetPos = getPaperPos(targetPaper);
                    return (
                      <line
                        key={`${paper.id}-${connId}`}
                        x1={`${targetPos.x}%`}
                        y1={`${targetPos.y}%`}
                        x2={`${pos.x}%`}
                        y2={`${pos.y}%`}
                        stroke={lanes[paper.lane].color}
                        strokeWidth="1"
                        strokeDasharray="4 4"
                        opacity="0.3"
                      />
                    );
                  });
                })}
              </svg>

              <div className="absolute inset-0 min-w-[1400px] p-24">
                {filteredPapers.map((paper) => {
                  const pos = getPaperPos(paper);
                  const isSelected = selectedId === paper.id;
                  const isHovered = hoveredId === paper.id;
                  const isTier1 = paper.tier === 1;

                  return (
                    <div 
                      key={paper.id}
                      className="absolute cursor-pointer transition-all duration-300 group"
                      style={{ left: `${pos.x}%`, top: `${pos.y}%`, transform: 'translate(-50%, -50%)' }}
                      onClick={() => setSelectedId(paper.id)}
                      onMouseEnter={() => setHoveredId(paper.id)}
                      onMouseLeave={() => setHoveredId(null)}
                    >
                      {(isHovered || isSelected) && (
                        <div className="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/90 border border-white/20 rounded-lg px-3 py-2 whitespace-nowrap z-50 pointer-events-none">
                          <div className="text-[11px] font-bold text-white">{paper.title}</div>
                          <div className="text-[9px] text-slate-400">{paper.author} · {paper.year}</div>
                        </div>
                      )}
                      <div className={`
                        rounded-full transition-all duration-300 flex items-center justify-center
                        ${isTier1 ? 'w-7 h-7 z-40' : 'w-4 h-4 z-20 border-2 border-slate-700 bg-black hover:border-slate-400'}
                        ${isSelected ? 'scale-125 bg-white ring-8 ring-blue-500/20' : ''}
                        ${isHovered && !isSelected ? 'scale-110 ring-4 ring-white/20' : ''}
                        ${isTier1 && paper.stage === 'Growth' ? 'animate-pulse' : ''}
                      `}
                      style={{ 
                        backgroundColor: isSelected ? '#fff' : (isTier1 ? lanes[paper.lane].color : 'transparent'),
                        borderColor: isTier1 ? 'transparent' : lanes[paper.lane].color,
                        boxShadow: (isTier1 && paper.stage === 'Growth') ? `0 0 30px ${lanes[paper.lane].color}66` : 'none'
                      }}>
                        {isTier1 && paper.stage === 'Growth' && (
                          <div className="absolute inset-0 rounded-full animate-ping opacity-30" style={{ backgroundColor: lanes[paper.lane].color }}></div>
                        )}
                      </div>

                      <div className={`
                        absolute top-10 left-1/2 -translate-x-1/2 whitespace-nowrap font-black tracking-tight
                        transition-all duration-300 pointer-events-none
                        ${isTier1 ? 'text-[11px] text-slate-200' : 'text-[9px] text-slate-600 opacity-60 group-hover:opacity-100 group-hover:text-slate-400'}
                        ${isSelected ? 'text-white text-xs opacity-100' : ''}
                      `}>
                        {paper.title}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <footer className="h-12 border-t border-white/5 bg-black flex items-center px-10 space-x-10 text-[10px] text-slate-600 uppercase tracking-widest font-bold">
              <div className="flex items-center space-x-3">
                <Icon name="Info" className="text-slate-700" size={14} />
                <span>X-Axis: 历史因果序列</span>
              </div>
              <div className="flex items-center space-x-3">
                <Icon name="TrendingUp" className="text-orange-600" size={14} />
                <span>闪烁节点: 引用增速指数级增长 (Alpha Signal)</span>
              </div>
            </footer>
          </div>

          <div className="w-[420px] bg-black border-l border-white/5 flex flex-col shadow-2xl z-40">
            {selectedPaper && (
              <div className="flex-1 p-8 overflow-y-auto space-y-8">
                {/* 模块 1：标题区 */}
                <div className="space-y-4">
                  <div className="flex items-center justify-between">
                    <span className="text-[10px] font-black uppercase tracking-[0.2em] px-3 py-1.5 rounded-sm border" style={{ color: lanes[selectedPaper.lane].color, backgroundColor: lanes[selectedPaper.lane].color + '10', borderColor: lanes[selectedPaper.lane].color + '30' }}>
                      {lanes[selectedPaper.lane].title}
                    </span>
                    {selectedPaper.positioning?.isParadigmShift && (
                      <span className="text-[9px] font-black text-orange-500 bg-orange-500/10 px-2 py-1 rounded-sm border border-orange-500/20 uppercase tracking-widest">Paradigm Shift</span>
                    )}
                  </div>
                  <div className="flex items-center gap-3">
                    <h2 className="text-2xl font-bold text-white tracking-tighter leading-none">{selectedPaper.title}</h2>
                    <a href={`https://arxiv.org/abs/${selectedPaper.arxivId}`} target="_blank" rel="noopener noreferrer" className="text-slate-600 hover:text-blue-400 transition-colors flex-shrink-0" title="查看原文">
                      <Icon name="ExternalLink" size={18} />
                    </a>
                  </div>
                  <div className="flex items-center gap-3 text-xs text-slate-600 font-mono">
                    <Icon name="Clock" size={14} /> {selectedPaper.year} · {selectedPaper.author}
                  </div>
                </div>

                {/* 模块 2：技术定位 */}
                {selectedPaper.positioning && (
                  <div className="space-y-3">
                    <div className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">技术定位 Positioning</div>
                    <div className="bg-[#0a0a0c] border border-white/5 rounded-xl p-4 space-y-2.5">
                      <div className="flex justify-between items-baseline">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider">技术角色</span>
                        <span className="text-sm font-bold text-slate-200">{selectedPaper.positioning.role}</span>
                      </div>
                      <div className="flex justify-between items-baseline">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider">对标技术</span>
                        <span className="text-sm text-slate-400">{selectedPaper.positioning.benchmark}</span>
                      </div>
                      <div className="border-t border-white/5 pt-2.5">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider block mb-1">核心差异</span>
                        <span className="text-xs text-slate-300 leading-relaxed">{selectedPaper.positioning.coreDiff}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* 模块 3：技术演进 */}
                {selectedPaper.evolution && (
                  <div className="space-y-3">
                    <div className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">技术演进 Evolution</div>
                    <div className="bg-[#0a0a0c] border border-white/5 rounded-xl p-4">
                      <div className="flex items-center gap-2 flex-wrap text-xs">
                        {selectedPaper.evolution.predecessors.map((p, i) => (
                          <React.Fragment key={p}>
                            <span className="text-slate-500 bg-white/5 px-2 py-0.5 rounded">{p}</span>
                            <span className="text-slate-700">→</span>
                          </React.Fragment>
                        ))}
                        <span className="font-bold px-2.5 py-0.5 rounded" style={{ color: lanes[selectedPaper.lane].color, backgroundColor: lanes[selectedPaper.lane].color + '15' }}>
                          {selectedPaper.evolution.current}
                        </span>
                        {selectedPaper.evolution.successors.length > 0 && (
                          <>
                            <span className="text-slate-700">→</span>
                            <div className="flex flex-col gap-1">
                              {selectedPaper.evolution.successors.map(s => (
                                <span key={s} className="text-slate-500 bg-white/5 px-2 py-0.5 rounded text-[11px]">{s}</span>
                              ))}
                            </div>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* 模块 4：当前阶段 */}
                {selectedPaper.stageDetail && (
                  <div className="space-y-3">
                    <div className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">当前阶段 Stage</div>
                    <div className="bg-[#0a0a0c] border border-white/5 rounded-xl p-4 space-y-3">
                      <div className="flex items-center gap-3">
                        <span className={`text-lg font-black ${selectedPaper.stage === 'Growth' ? 'text-orange-500' : selectedPaper.stage === 'Early' ? 'text-emerald-500' : 'text-blue-500'}`}>
                          {selectedPaper.stageDetail.phase}
                        </span>
                        <span className="text-[10px] text-slate-600 font-mono">{selectedPaper.stageDetail.period}</span>
                      </div>
                      {selectedPaper.growth && (
                        <div className="flex items-center gap-2">
                          <Icon name="TrendingUp" className="text-orange-500" size={14} />
                          <span className="text-sm font-mono font-bold text-white">+{selectedPaper.growth}</span>
                          <span className="text-[10px] text-slate-600">引文增速 (12M)</span>
                        </div>
                      )}
                      <div className="border-t border-white/5 pt-2.5 space-y-1.5">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider">信号 Signals</span>
                        {selectedPaper.stageDetail.signals.map((s, i) => (
                          <div key={i} className="flex items-start gap-2 text-xs text-slate-400">
                            <span className="text-slate-700 mt-0.5">·</span>
                            <span>{s}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 模块 5：核心玩家 */}
                {selectedPaper.players && (
                  <div className="space-y-3">
                    <div className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">核心玩家 Key Players</div>
                    <div className="bg-[#0a0a0c] border border-white/5 rounded-xl p-4 space-y-3">
                      <div className="space-y-2">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider">核心研究者</span>
                        {selectedPaper.players.coreResearchers.map((r, i) => (
                          <div key={i} className="flex justify-between items-baseline">
                            <span className="text-sm text-slate-200 font-medium">{r.name}</span>
                            <span className="text-[10px] text-slate-600 font-mono">{r.affiliation}</span>
                          </div>
                        ))}
                      </div>
                      <div className="border-t border-white/5 pt-2.5 space-y-1.5">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider">活跃团队</span>
                        <div className="flex flex-wrap gap-1.5">
                          {selectedPaper.players.activeTeams.map((t, i) => (
                            <span key={i} className="text-[10px] text-slate-400 bg-white/5 px-2 py-0.5 rounded">{t}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* 模块 6：瓶颈分析 */}
                {selectedPaper.bottlenecks && (
                  <div className="space-y-3">
                    <div className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">瓶颈分析 Bottleneck</div>
                    <div className="bg-[#0a0a0c] border border-white/5 rounded-xl p-4 space-y-3">
                      <div className="space-y-1.5">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider">当前限制</span>
                        {selectedPaper.bottlenecks.current.map((b, i) => (
                          <div key={i} className="flex items-start gap-2 text-xs text-slate-400">
                            <span className="text-red-900 mt-0.5">·</span>
                            <span>{b}</span>
                          </div>
                        ))}
                      </div>
                      <div className="border-t border-white/5 pt-2.5">
                        <span className="text-[10px] text-slate-600 uppercase tracking-wider block mb-1">未解决</span>
                        <span className="text-xs text-slate-500 italic leading-relaxed">{selectedPaper.bottlenecks.unsolved}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* 模块 7：结论（降权） */}
                {selectedPaper.conclusion && (
                  <div className="space-y-3 pt-2 border-t border-white/5">
                    <div className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">结论 Summary</div>
                    <p className="text-sm text-slate-400 leading-relaxed">{selectedPaper.conclusion}</p>
                  </div>
                )}

                {/* arXiv 按钮 */}
                <div className="pt-4">
                  <a
                    href={`https://arxiv.org/abs/${selectedPaper.arxivId}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="w-full h-12 rounded-xl font-black text-[10px] transition-all flex items-center justify-center gap-3 uppercase tracking-[0.3em] active:scale-95 border"
                    style={{ color: lanes[selectedPaper.lane].color, borderColor: lanes[selectedPaper.lane].color + '40', backgroundColor: lanes[selectedPaper.lane].color + '08' }}
                  >
                    查看原文 arXiv <Icon name="ExternalLink" size={16} />
                  </a>
                </div>
              </div>
            )}

            {/* Tier-2 简化面板 */}
            {!selectedPaper && selectedId && (() => {
              const p = allPapers.find(x => x.id === selectedId);
              if (!p) return null;
              return (
                <div className="flex-1 p-8 space-y-6">
                  <div className="space-y-3">
                    <span className="text-[10px] font-black uppercase tracking-[0.2em] px-3 py-1.5 rounded-sm border" style={{ color: lanes[p.lane].color, borderColor: lanes[p.lane].color + '30' }}>
                      {lanes[p.lane].title}
                    </span>
                    <h2 className="text-xl font-bold text-white tracking-tight">{p.title}</h2>
                    <div className="text-xs text-slate-600 font-mono">{p.year} · {p.author}</div>
                  </div>
                  <a href={`https://arxiv.org/abs/${p.arxivId}`} target="_blank" rel="noopener noreferrer" className="text-xs text-slate-500 hover:text-blue-400 flex items-center gap-2">
                    <Icon name="ExternalLink" size={14} /> arXiv: {p.arxivId}
                  </a>
                </div>
              );
            })()}
          </div>

          <style>{`
            ::-webkit-scrollbar { width: 4px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: #2a2a2d; }
          `}</style>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
