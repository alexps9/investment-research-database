    evol:['Reflexion → R1（思想）','Test-Time Scaling → R1（路线）','R1 → 后续RL-reasoning'],
    evolColors:['#993556','#993556','#993556'],
    arxiv:'2501.12948'
  },
  {
    id:'distill', stream:'inf', year:2026.33, name:'Attn→Mamba Distill',
    authors:'2026', citations:65,
    summary:'把Transformer知识蒸馏进Mamba架构，inference成本大幅降低。两大路线融合的工程实现。',
    tags:['distillation','mamba','2026','efficiency'], stage:'early',
    metrics:[{k:'引用量',v:'65'},{k:'alpha',v:'High'},{k:'意义',v:'路线融合'},{k:'方向',v:'成本下降'}],
    evol:['Mamba → 蒸馏目标','Transformer → 蒸馏源','→ 低成本inference'],
    evolColors:['#3B6D11','#185FA5','#993556'],
    arxiv:'2604.14191'
  },
];

const EDGES = [
  ['fa2','infini'],['streamllm','infini'],['yarn','longropE'],
  ['hyena','mamba'],['mamba','mamba2'],['mamba2','mamba3'],['mamba','remamba'],
  ['mamba','jamba'],['griffin','nemotron'],['jamba','jamba15'],
  ['mamba2','transmamba'],['jamba','nemotron'],
  ['rwkv','retnet'],['longnet','kimilc'],
  ['tot','tts'],['reflexion','r1'],['tts','r1'],
  ['mamba','griffin'],['mamba2','distill'],['r1','distill'],
];

const PAD_L=56, PAD_R=16, PAD_T=32, PAD_B=28;
const STREAMS_ORDER = ['attn','ssm','hybrid','mem','inf'];
const YEAR_MIN=2023, YEAR_MAX=2026.5;

let activeFilter='all', selectedId=null;

const plotSVG = document.getElementById('plot');
const plotArea = document.getElementById('plot-area');
const tooltip = document.getElementById('tooltip');

function getW(){ return plotArea.getBoundingClientRect().width || 420; }
function getH(){ return 520; }

function xScale(year){
  const W=getW();
  return PAD_L + (year-YEAR_MIN)/(YEAR_MAX-YEAR_MIN)*(W-PAD_L-PAD_R);
}
function yScale(stream){
  const idx=STREAMS_ORDER.indexOf(stream);
  const H=getH();
  const usable=H-PAD_T-PAD_B;
  const step=usable/(STREAMS_ORDER.length-1);
  return PAD_T+idx*step;
}
function citeSize(c){
  if(c>4000) return 11;
  if(c>1500) return 9;
  if(c>600)  return 7;
  if(c>200)  return 6;
  return 5;
}
function isVisible(p){
  return activeFilter==='all' || p.stream===activeFilter;
}

function render(){
  const W=getW(), H=getH();
  plotSVG.setAttribute('viewBox',`0 0 ${W} ${H}`);
  plotSVG.setAttribute('height', H);
  plotSVG.innerHTML='';

  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>`;
  plotSVG.appendChild(defs);

  const g_grid=document.createElementNS('http://www.w3.org/2000/svg','g');
  for(let y=2023;y<=2026;y++){
    const x=xScale(y);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x);line.setAttribute('x2',x);
    line.setAttribute('y1',PAD_T-10);line.setAttribute('y2',H-PAD_B+4);
    line.setAttribute('stroke','var(--color-border-tertiary)');line.setAttribute('stroke-width','0.5');
    g_grid.appendChild(line);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',x);txt.setAttribute('y',PAD_T-14);
    txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','10');
    txt.setAttribute('fill','var(--color-text-tertiary)');txt.textContent=y;
    g_grid.appendChild(txt);
  }
  const nowX=xScale(2026.36);
  const nowLine=document.createElementNS('http://www.w3.org/2000/svg','line');
  nowLine.setAttribute('x1',nowX);nowLine.setAttribute('x2',nowX);
  nowLine.setAttribute('y1',PAD_T-10);nowLine.setAttribute('y2',H-PAD_B);
  nowLine.setAttribute('stroke','rgba(227,75,74,0.5)');nowLine.setAttribute('stroke-width','1');nowLine.setAttribute('stroke-dasharray','3,3');
  g_grid.appendChild(nowLine);
  const nowTxt=document.createElementNS('http://www.w3.org/2000/svg','text');
  nowTxt.setAttribute('x',nowX+3);nowTxt.setAttribute('y',PAD_T-14);
  nowTxt.setAttribute('font-size','9');nowTxt.setAttribute('fill','rgba(227,75,74,0.8)');
  nowTxt.textContent='NOW';g_grid.appendChild(nowTxt);
  plotSVG.appendChild(g_grid);

  STREAMS_ORDER.forEach((sid,i)=>{
    const y=yScale(sid);
    const s=STREAMS[sid];
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x', PAD_L-6);lbl.setAttribute('y',y+1);
    lbl.setAttribute('text-anchor','end');lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('font-size','10');
    lbl.setAttribute('fill', isVisible({stream:sid}) ? s.color : 'var(--color-text-tertiary)');
    lbl.setAttribute('font-weight', isVisible({stream:sid}) ? '500':'400');
    const short=['Attn','SSM','Hybrid','Memory','Inf/CoT'];
    lbl.textContent=short[i];
    plotSVG.appendChild(lbl);
  });

  const g_edges=document.createElementNS('http://www.w3.org/2000/svg','g');
  EDGES.forEach(([a,b])=>{
    const pa=PAPERS.find(p=>p.id===a), pb=PAPERS.find(p=>p.id===b);
    if(!pa||!pb) return;
    if(!isVisible(pa)&&!isVisible(pb)) return;
    const x1=xScale(pa.year),y1=yScale(pa.stream);
    const x2=xScale(pb.year),y2=yScale(pb.stream);
    const isCross=pa.stream!==pb.stream;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx=(x1+x2)/2;
    path.setAttribute('d',`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', isCross ? '#BA7517' : STREAMS[pa.stream].color);
    path.setAttribute('stroke-width', isCross?'1.2':'0.8');
    path.setAttribute('stroke-opacity', isCross?'0.35':'0.25');
    path.setAttribute('stroke-dasharray', isCross?'4 3':'none');
    path.setAttribute('marker-end','url(#arr)');
    g_edges.appendChild(path);
  });
  plotSVG.appendChild(g_edges);

  const g_nodes=document.createElementNS('http://www.w3.org/2000/svg','g');
  PAPERS.forEach(p=>{
    const vis=isVisible(p);
    const s=STREAMS[p.stream];
    const x=xScale(p.year), y=yScale(p.stream);
    const r=citeSize(p.citations);
    const grp=document.createElementNS('http://www.w3.org/2000/svg','g');
    grp.style.cursor='pointer';

    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x);circle.setAttribute('cy',y);circle.setAttribute('r',r);
    circle.setAttribute('fill', vis ? s.fill : 'var(--color-background-secondary)');
    circle.setAttribute('stroke', vis ? s.color : 'var(--color-border-tertiary)');
    circle.setAttribute('stroke-width', selectedId===p.id ? '2' : '1');
    circle.setAttribute('opacity', vis ? '1' : '0.3');

    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',x+r+3);lbl.setAttribute('y',y+1);
    lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('font-size','9.5');
    lbl.setAttribute('fill', vis ? 'var(--color-text-secondary)' : 'var(--color-text-tertiary)');
    lbl.setAttribute('opacity', vis?'1':'0.4');
    lbl.textContent=p.name;

    grp.appendChild(circle);
    grp.appendChild(lbl);

    grp.addEventListener('mouseenter',(e)=>{
      circle.setAttribute('stroke-width','2');
      tooltip.style.display='block';
      document.getElementById('tt-title').textContent=p.name;
      document.getElementById('tt-meta').textContent=`${p.authors} · ${p.citations.toLocaleString()} citations`;
    });
    grp.addEventListener('mousemove',(e)=>{
      const rect=plotArea.getBoundingClientRect();
      let tx=e.clientX-rect.left+12, ty=e.clientY-rect.top-36;
      if(tx+190>rect.width) tx=e.clientX-rect.left-190;
      tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
    });
    grp.addEventListener('mouseleave',()=>{
      if(selectedId!==p.id) circle.setAttribute('stroke-width','1');
      tooltip.style.display='none';
    });
    grp.addEventListener('click',(e)=>{
      e.stopPropagation();
      selectedId=p.id;
      render();
      showDetail(p);
    });
    g_nodes.appendChild(grp);
  });
  plotSVG.appendChild(g_nodes);
}

function showDetail(p){
  document.getElementById('right-empty').style.display='none';
  const panel=document.getElementById('right-panel');
  panel.classList.add('open');

  document.getElementById('rp-title').textContent=p.name;
  document.getElementById('rp-authors').textContent=p.authors + ' · ' + Math.round(p.year);

  document.getElementById('rp-summary').textContent=p.summary;

  const badges=document.getElementById('rp-badges');
  badges.innerHTML='';
  const s=STREAMS[p.stream];
  const sb=document.createElement('span');
  sb.className='badge';
  sb.style.cssText=`background:${s.fill};color:${s.color};border:0.5px solid ${s.color}44;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500`;
  sb.textContent=s.label;
  badges.appendChild(sb);
  p.tags.forEach(t=>{
    const tg=document.createElement('span');
    tg.className='badge badge-stream';
    tg.textContent='#'+t;
    badges.appendChild(tg);
  });

  const sc=STAGE_CFG[p.stage];
  document.getElementById('rp-stage-name').textContent=sc.name;
  document.getElementById('rp-stage-name').style.color=sc.color;
  document.getElementById('rp-stage-hint').textContent=sc.hint;
  const bar=document.getElementById('rp-stage-bar');
  bar.innerHTML='';
  [1,2,3].forEach(i=>{
    const seg=document.createElement('div');
    seg.className='stage-seg'+(i<=sc.segs?' filled':'');
    seg.style.color=sc.color;
    bar.appendChild(seg);
  });

  const mg=document.getElementById('rp-metrics');
  mg.innerHTML='';
  p.metrics.forEach(m=>{
    const card=document.createElement('div');
    card.className='metric-card';
    card.innerHTML=`<div class="metric-val">${m.v}</div><div class="metric-key">${m.k}</div>`;
    mg.appendChild(card);
  });

  const el=document.getElementById('rp-evol');
  el.innerHTML='';
  const stream=STREAMS[p.stream];
  (p.evol||[]).forEach((e,i)=>{
    const item=document.createElement('div');
    item.className='evol-item';
    const col=p.evolColors?.[i]||stream.color;
    item.innerHTML=`<span class="evol-dot" style="background:${col}"></span><span>${e}</span>`;
    el.appendChild(item);
  });

  const link=document.getElementById('rp-link');
  if(p.arxiv&&p.arxiv.match(/^\d{4}\.\d/)){
    link.href='https://arxiv.org/abs/'+p.arxiv;
    link.textContent='arxiv.org/abs/'+p.arxiv+' →';
    link.style.display='block';
  } else {
    link.style.display='none';
  }
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.f;
    render();
  });
});

plotArea.addEventListener('click',()=>{ selectedId=null; render(); });

window.addEventListener('resize',()=>render());
render();
</script>
</body>
</html>
