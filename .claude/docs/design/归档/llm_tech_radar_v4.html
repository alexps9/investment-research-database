
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.app{display:flex;flex-direction:column;gap:0}
.topbar{display:flex;align-items:center;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);padding:0}
.view-btn{font-size:12px;padding:8px 14px;border:none;border-right:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .12s;white-space:nowrap}
.view-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.view-btn:hover:not(.active){background:var(--color-background-secondary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 10px}
.filter-chip{font-size:11px;padding:3px 8px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .12s}
.filter-chip.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.main{display:flex;gap:0;min-height:560px}
.plot-col{flex:1;min-width:0;display:flex;flex-direction:column}
.heat-wrap{border-bottom:0.5px solid var(--color-border-tertiary);padding:8px 12px 6px}
.heat-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:4px;letter-spacing:.06em}
.scatter-wrap{flex:1;position:relative;overflow:hidden}
svg.scatter{display:block;overflow:visible}
.detail-col{width:230px;flex-shrink:0;border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow-y:auto}
.detail-col.collapsed{width:26px}
.col-toggle{display:flex;align-items:flex-start;justify-content:center;padding:8px 0;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)}
.col-inner{flex:1;display:flex;flex-direction:column}
.detail-col.collapsed .col-inner{display:none}
.d-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:6px;padding:20px;color:var(--color-text-tertiary);font-size:11px;text-align:center}
.d-open{display:flex;flex-direction:column;flex:1}
.d-hdr{padding:12px 12px 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.d-title{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.35}
.d-sub{font-size:11px;color:var(--color-text-secondary)}
.d-body{padding:10px 12px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.sl{font-size:10px;font-weight:500;letter-spacing:.07em;color:var(--color-text-tertiary);text-transform:uppercase;margin-bottom:4px}
.summary-txt{font-size:11px;color:var(--color-text-secondary);line-height:1.6}
.badge-row{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary)}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mc{background:var(--color-background-secondary);border-radius:6px;padding:6px 7px}
.mc-val{font-size:14px;font-weight:500;line-height:1}
.mc-key{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.stg-row{display:flex;justify-content:space-between;align-items:center}
.stg-bar{display:flex;gap:2px;margin-top:4px}
.stg-seg{height:3px;border-radius:2px;flex:1;background:var(--color-border-tertiary)}
.stg-seg.on{background:currentColor}
.evol-list{display:flex;flex-direction:column;gap:3px}
.evol-item{display:flex;align-items:flex-start;gap:5px;font-size:11px;color:var(--color-text-secondary);line-height:1.4}
.evol-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.d-link{display:block;font-size:11px;color:var(--color-text-info);padding:8px 12px 12px;text-decoration:none;border-top:0.5px solid var(--color-border-tertiary);margin-top:auto}
.tt{position:absolute;pointer-events:none;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:6px 9px;font-size:11px;z-index:20;display:none;max-width:190px;line-height:1.45}
.tt-title{font-weight:500;margin-bottom:2px}
.tt-meta{color:var(--color-text-secondary)}
.legend-row{display:flex;gap:12px;flex-wrap:wrap;padding:6px 12px 0;border-top:0.5px solid var(--color-border-tertiary)}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-secondary);cursor:pointer}
.leg-dot{width:8px;height:8px;border-radius:50%}
.cmp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;flex:1}
.cmp-lane{border-right:0.5px solid var(--color-border-tertiary);padding:10px 10px;display:flex;flex-direction:column;gap:6px}
.cmp-lane:last-child{border-right:none}
.cmp-lane-title{font-size:11px;font-weight:500;margin-bottom:4px}
.cmp-card{background:var(--color-background-secondary);border-radius:6px;padding:7px 8px;font-size:11px;cursor:pointer;transition:background .1s;border:0.5px solid transparent}
.cmp-card:hover{border-color:var(--color-border-secondary)}
.cmp-card.sel{border-color:var(--color-border-primary)}
.cmp-card-title{font-weight:500;margin-bottom:2px;font-size:11px}
.cmp-card-meta{font-size:10px;color:var(--color-text-tertiary)}
.cmp-tag{display:inline-block;font-size:9px;padding:1px 4px;border-radius:2px;margin-top:3px}
</style>

<div class="topbar">

        </div>
        <a class="d-link" id="d-link" href="#" target="_blank"></a>
      </div>
    </div>
  </div>
</div>
</div>

  {id:'gshard',   lane:'scale',sub:'sc-base',   year:2023.25, name:'GShard / Switch',   authors:'Google · Lepikhin et al.',        citations:3500, alpha:'Low',  stage:'mature', summary:'万亿参数稀疏激活范式：每token只激活部分专家，训练效率大幅提升。',                       tags:['MoE','trillion','google'],             evol:['Dense → MoE','GShard → Switch Transformer'],          evolC:['#BA7517','#BA7517'],          arxiv:'2006.16668', cmp:null},
  {id:'megablks', lane:'scale',sub:'sc-base',   year:2023.42, name:'MegaBlocks',        authors:'Gale et al. · 2023',              citations:480,  alpha:'Low',  stage:'mature', summary:'稀疏MoE的高效GPU kernel，解决MoE训练的负载不均问题。',                              tags:['MoE','GPU','kernel'],                 evol:['Switch Transformer → MegaBlocks'],                    evolC:['#BA7517'],                    arxiv:'2211.15841', cmp:null},
  {id:'expertchoice',lane:'scale',sub:'sc-route',year:2023.42,name:'Expert Choice MoE','authors':'Zhou et al. · Google · 2022',   citations:860,  alpha:'Mid',  stage:'mature', summary:'专家选token而非token选专家，解决负载不均和专家塌缩问题。',                             tags:['MoE','routing','load-balance'],        evol:['Top-k Routing → Expert Choice'],                      evolC:['#993556'],                    arxiv:'2202.09368', cmp:null},
  {id:'dsmoe',    lane:'scale',sub:'sc-route',  year:2024.12, name:'DeepSeekMoE',       authors:'DeepSeek AI · 2024',              citations:740,  alpha:'High', stage:'growth', summary:'细粒度专家+共享专家：专家数量增加8×，每个专家更小，专家利用率显著提升。',              tags:['MoE','fine-grained','shared'],         evol:['Expert Choice → DeepSeekMoE','DeepSeekMoE → V3'],     evolC:['#993556','#BA7517'],          arxiv:'2401.06066', cmp:null},
  {id:'mixtral',  lane:'scale',sub:'sc-prod',   year:2023.97, name:'Mixtral 8x7B',      authors:'Mistral AI · 2023',               citations:3100, alpha:'High', stage:'mature', summary:'首个广泛使用的开源MoE产品模型，推理成本约等于13B密集模型。',                         tags:['MoE','open-source','prod'],            evol:['Switch Transformer → Mixtral','Mixtral → Mixtral 8x22B'],evolC:['#BA7517','#BA7517'],       arxiv:'2401.04088', cmp:null},
  {id:'dsv3',     lane:'scale',sub:'sc-prod',   year:2024.97, name:'DeepSeek-V3',       authors:'DeepSeek AI · 2024',              citations:1800, alpha:'High', stage:'growth', summary:'MLA + DeepSeekMoE + FP8训练：671B参数，激活37B，训练成本仅600万美元。',              tags:['MoE','MLA','FP8','DeepSeek'],          evol:['DeepSeekMoE → V3','MLA → V3'],                        evolC:['#BA7517','#3B6D11'],          arxiv:'2412.19437', cmp:null},
  {id:'jambasc',  lane:'scale',sub:'sc-prod',   year:2024.23, name:'Jamba (MoE+SSM)',   authors:'AI21 Labs · 2024',                citations:1400, alpha:'High', stage:'mature', summary:'SSM+MoE工业融合：Mamba层替代部分attention，专家分工进一步细化。',                   tags:['MoE','SSM','hybrid','prod'],           evol:['Mamba → Jamba MoE','Switch → Jamba MoE'],             evolC:['#185FA5','#BA7517'],          arxiv:'2403.19887', cmp:null},
];

const COMPARE_SERIES={
  mamba:{label:'Mamba系', color:'#185FA5', ids:['hyena','mamba','mamba2','mamba3','griffin','jamba']},
  rwkv: {label:'RWKV系',  color:'#3B6D11', ids:['rwkv4','rwkv6','retnet']},
  transformer:{label:'Transformer优化', color:'#BA7517', ids:['rope','yarn','longropE','mqa','mla','fa2','paged']},
};

const QUARTERS=[];
for(let y=2023;y<=2026;y++){
  const qs=y===2023?[3,4]:y===2026?[1,2]:  [1,2,3,4];
  qs.forEach(q=>QUARTERS.push({y,q}));
}

let currentView='global', currentTopic='seq', panelOpen=true, selectedId=null, filterLane='all';

const PAD={l:8,r:8,t:28,b:22};
let heatChart=null;

function getLanes(){
  if(currentView==='global') return LANES_GLOBAL;
  if(currentView==='topic')  return LANES_TOPIC[currentTopic];
  return [{id:'mamba',label:'Mamba系',color:'#185FA5',fill:'#B5D4F4'},{id:'rwkv',label:'RWKV系',color:'#3B6D11',fill:'#C0DD97'},{id:'transformer',label:'Transformer优化',color:'#BA7517',fill:'#FAC775'}];
}

function getPapers(){
  if(currentView==='global') return PAPERS.filter(p=>filterLane==='all'||p.lane===filterLane);
  if(currentView==='topic')  return PAPERS.filter(p=>p.sub?.startsWith(currentTopic)||p.lane===currentTopic);
  const allIds=Object.values(COMPARE_SERIES).flatMap(s=>s.ids);
  return PAPERS.filter(p=>allIds.includes(p.id));
}

function paperLaneKey(p){
  if(currentView==='global') return p.lane;
  if(currentView==='topic')  return p.sub||p.lane;
  for(const [k,s] of Object.entries(COMPARE_SERIES)){if(s.ids.includes(p.id)) return k;}
  return null;
}

function getW(){return document.getElementById('scatter-wrap').getBoundingClientRect().width||420}
function getH(){return 420}
function xScale(year){const W=getW();return PAD.l+(year-2023)/(2026.6-2023)*(W-PAD.l-PAD.r)}
function yScale(laneIdx,totalLanes){
  const H=getH(),usable=H-PAD.t-PAD.b;
  return totalLanes===1?H/2:PAD.t+laneIdx*(usable/(totalLanes-1));
}
function citeR(c){return c>4000?11:c>1500?9:c>600?7:c>200?6:5}

function svgEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs||{}).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

function renderTopbar(){
  const tr=document.getElementById('topbar-right');
  tr.innerHTML='';
  if(currentView==='global'){
    const chips=[{id:'all',label:'全部'},{id:'seq',label:'序列'},{id:'infer',label:'推理效率'},{id:'scale',label:'MoE'}];
    chips.forEach(c=>{
      const b=document.createElement('button');
      b.className='filter-chip'+(filterLane===c.id?' active':'');
      b.textContent=c.label; b.dataset.lane=c.id;
      b.addEventListener('click',()=>{filterLane=c.id;renderAll();});
      tr.appendChild(b);
    });
  } else if(currentView==='topic'){
    const chips=[{id:'seq',label:'序列&长上下文'},{id:'infer',label:'推理效率'},{id:'scale',label:'MoE'}];
    chips.forEach(c=>{
      const b=document.createElement('button');
      b.className='filter-chip'+(currentTopic===c.id?' active':'');
      b.textContent=c.label; b.dataset.topic=c.id;
      b.addEventListener('click',()=>{currentTopic=c.id;selectedId=null;renderAll();});
      tr.appendChild(b);
    });
  }
}

function renderLegend(){
  const row=document.getElementById('legend-row');
  row.innerHTML='';
  getLanes().forEach(l=>{
    const item=document.createElement('div');
    item.className='leg-item';
    item.innerHTML=`<span class="leg-dot" style="background:${l.fill};border:1px solid ${l.color}"></span><span style="color:${l.color}">${l.short||l.label}</span>`;
    row.appendChild(item);
  });
  const sz=[{r:11,l:'5K+'},{r:8,l:'1K+'},{r:6,l:'500+'}];
  const sep=document.createElement('span');
  sep.style.cssText='font-size:10px;color:var(--color-text-tertiary);margin-left:8px';
  sep.textContent='点大小 = 引用量'; row.appendChild(sep);
}

function renderHeat(){
  const papers=getPapers();
  const lanes=getLanes();
  const datasets=lanes.map(l=>{
    return {
      label:l.short||l.label,
      data:QUARTERS.map(({y,q})=>{
        return papers.filter(p=>{
          const lk=paperLaneKey(p);
          if(lk!==l.id) return false;
          const py=Math.floor(p.year);
          const pq=Math.ceil((p.year-py)*4)||1;
          const iy=Math.floor(p.year);
          const iq=Math.round((p.year-iy)*4)+1;
          return iy===y&&iq===q;
        }).length;
      }),
      backgroundColor:l.fill,
      borderColor:l.color,
      borderWidth:0.5,
    };
  });
  const labels=QUARTERS.map(({y,q})=>`${y}Q${q}`);
  if(heatChart) heatChart.destroy();
  heatChart=new Chart(document.getElementById('heat-chart'),{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}篇`}}},
      scales:{
        x:{stacked:true,ticks:{font:{size:9},color:'#888780',maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false},border:{display:false}},
        y:{stacked:true,display:false,grid:{display:false}},
      },
      animation:{duration:200},
    }
  });
}

function renderScatter(){
  const W=getW(),H=getH();
  const svg=document.getElementById('scatter');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('height',H);
  svg.innerHTML='';

  const lanes=getLanes();
  const papers=getPapers();

  const defs=svgEl('defs');
  defs.innerHTML=`<marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>`;
  svg.appendChild(defs);

  const gBg=svgEl('g');
  for(let y=2023;y<=2026;y++){
    const x=xScale(y);
    gBg.appendChild(svgEl('line',{x1:x,x2:x,y1:PAD.t-8,y2:H-PAD.b,stroke:'var(--color-border-tertiary)','stroke-width':'0.5'}));
    const t=svgEl('text',{x,y:PAD.t-10,'text-anchor':'middle','font-size':'10',fill:'var(--color-text-tertiary)'}); t.textContent=y; gBg.appendChild(t);
  }
  const nowX=xScale(2026.38);
  gBg.appendChild(svgEl('line',{x1:nowX,x2:nowX,y1:PAD.t-8,y2:H-PAD.b,stroke:'rgba(227,74,74,0.45)','stroke-width':'1','stroke-dasharray':'3,3'}));
  const nt=svgEl('text',{x:nowX+3,y:PAD.t-10,'font-size':'9',fill:'rgba(227,74,74,0.8)'}); nt.textContent='NOW'; gBg.appendChild(nt);
  svg.appendChild(gBg);

  lanes.forEach((l,i)=>{
    const y=yScale(i,lanes.length);
    const t=svgEl('text',{x:4,y:y+1,'dominant-baseline':'middle','font-size':'9.5',fill:l.color,'font-weight':'500'});
    t.textContent=l.short||l.label.slice(0,10); svg.appendChild(t);
    svg.appendChild(svgEl('line',{x1:PAD.l,x2:W-PAD.r,y1:y,y2:y,stroke:l.color,'stroke-width':'0.5',opacity:'0.12'}));
  });

  const nowX2=xScale(2026.38);
  const pMap=Object.fromEntries(papers.map(p=>[p.id,p]));

  const gE=svgEl('g');
  papers.forEach(pa=>{
    (pa.evol||[]).forEach((estr,ei)=>{
      const targetName=estr.split('→').pop().trim().replace(/（.*）/,'').trim();
      const pb=papers.find(p=>p.name.includes(targetName)||targetName.includes(p.name.split(' ')[0]));
      if(!pb||pb.id===pa.id) return;
      const laA=lanes.findIndex(l=>l.id===paperLaneKey(pa));
      const laB=lanes.findIndex(l=>l.id===paperLaneKey(pb));
      if(laA<0||laB<0) return;
      const x1=xScale(pa.year),y1=yScale(laA,lanes.length);
      const x2=xScale(pb.year),y2=yScale(laB,lanes.length);
      const cross=laA!==laB;
      const mx=(x1+x2)/2;
      const path=svgEl('path',{
        d:`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`,
        fill:'none',
        stroke:pa.evolC?.[ei]||lanes[laA]?.color||'#888',
        'stroke-width':cross?'1.2':'0.8',
        'stroke-opacity':cross?'0.28':'0.2',
        'stroke-dasharray':cross?'4 3':'none',
        'marker-end':'url(#arr2)'
      });
      gE.appendChild(path);
    });
  });
  svg.appendChild(gE);

  const gN=svgEl('g');
  papers.forEach(p=>{
    const lk=paperLaneKey(p);
    const li=lanes.findIndex(l=>l.id===lk);
    if(li<0) return;
    const lane=lanes[li];
    const cx=xScale(p.year),cy=yScale(li,lanes.length);
    const r=citeR(p.citations);
    const grp=svgEl('g'); grp.style.cursor='pointer';

    const circle=svgEl('circle',{cx,cy,r,fill:lane.fill,stroke:lane.color,'stroke-width':selectedId===p.id?'2.5':'1',opacity:'1'});
    if(selectedId===p.id){
      const ring=svgEl('circle',{cx,cy,r:r+4,fill:'none',stroke:lane.color,'stroke-width':'0.8','stroke-opacity':'0.4'});
      grp.appendChild(ring);
    }
    grp.appendChild(circle);

    grp.addEventListener('mouseenter',e=>{
      if(selectedId!==p.id) circle.setAttribute('stroke-width','2');
      const lbl=svgEl('text',{x:cx+r+3,y:cy+1,'dominant-baseline':'middle','font-size':'9.5',fill:'var(--color-text-primary)','class':'hl'});
      lbl.textContent=p.name; grp.appendChild(lbl);
      const tt=document.getElementById('tt');
      tt.style.display='block';
      document.getElementById('tt-t').textContent=p.name;
      document.getElementById('tt-m').textContent=`${p.authors} · ${p.citations.toLocaleString()} citations`;
    });
    grp.addEventListener('mousemove',e=>{
      const rect=document.getElementById('scatter-wrap').getBoundingClientRect();
      let tx=e.clientX-rect.left+14,ty=e.clientY-rect.top-40;
      if(tx+200>rect.width) tx=e.clientX-rect.left-200;
      if(ty<4) ty=4;
      const tt=document.getElementById('tt'); tt.style.left=tx+'px'; tt.style.top=ty+'px';
    });
    grp.addEventListener('mouseleave',()=>{
      if(selectedId!==p.id) circle.setAttribute('stroke-width','1');
      grp.querySelectorAll('.hl').forEach(l=>l.remove());
      document.getElementById('tt').style.display='none';
    });
    grp.addEventListener('click',e=>{
      e.stopPropagation();
      selectedId=p.id;
      if(!panelOpen){panelOpen=true;document.getElementById('detail-col').classList.remove('collapsed');document.getElementById('tog-icon').className='ti ti-chevron-right';setTimeout(()=>renderScatter(),210);}
      renderScatter();
      showDetail(p,lane);
    });
    gN.appendChild(grp);
  });
  svg.appendChild(gN);
}

function showDetail(p,lane){
  document.getElementById('d-empty').style.display='none';
  document.getElementById('d-open').style.display='flex';
  document.getElementById('d-title').textContent=p.name;
  document.getElementById('d-sub').textContent=p.authors;
  document.getElementById('d-summary').textContent=p.summary;

  const br=document.getElementById('d-badges');
  br.innerHTML='';
  const sb=document.createElement('span');
  sb.className='badge';
  sb.style.cssText=`background:${lane.fill};color:${lane.color};border:0.5px solid ${lane.color}55`;
  sb.textContent=lane.short||lane.label; br.appendChild(sb);
  p.tags.forEach(t=>{const tg=document.createElement('span');tg.className='badge';tg.textContent='#'+t;br.appendChild(tg);});

  const ALPHA_C={High:'#BA7517',Mid:'#185FA5',Low:'#5F5E5A'};
  const mg=document.getElementById('d-metrics');
  mg.innerHTML='';
  [{k:'引用量',v:p.citations>=1000?(p.citations/1000).toFixed(1)+'K':String(p.citations)},{k:'年份',v:String(Math.floor(p.year))},{k:'Alpha',v:p.alpha,c:ALPHA_C[p.alpha]},{k:'阶段',v:STAGE_CFG[p.stage].name,c:STAGE_CFG[p.stage].color}].forEach(m=>{
    const card=document.createElement('div');
    card.className='mc';
    card.innerHTML=`<div class="mc-val"${m.c?` style="color:${m.c}"`:''} >${m.v}</div><div class="mc-key">${m.k}</div>`;
    mg.appendChild(card);
  });

  const sc=STAGE_CFG[p.stage];
  document.getElementById('d-stg-name').textContent=sc.name;
  document.getElementById('d-stg-name').style.color=sc.color;
  document.getElementById('d-stg-hint').textContent=sc.hint;
  const sb2=document.getElementById('d-stg-bar'); sb2.innerHTML='';
  [1,2,3].forEach(i=>{const s=document.createElement('div');s.className='stg-seg'+(i<=sc.segs?' on':'');s.style.color=sc.color;sb2.appendChild(s);});

  const el=document.getElementById('d-evol'); el.innerHTML='';
  (p.evol||[]).forEach((e,i)=>{
    const item=document.createElement('div'); item.className='evol-item';
    item.innerHTML=`<span class="evol-dot" style="background:${p.evolC?.[i]||lane.color}"></span><span>${e}</span>`;
    el.appendChild(item);
  });

  const lk=document.getElementById('d-link');
  if(p.arxiv&&/^\d{4}/.test(p.arxiv)){lk.href='https://arxiv.org/abs/'+p.arxiv;lk.textContent='arXiv: '+p.arxiv+' →';lk.style.display='block';}
  else lk.style.display='none';
}

function renderCompareView(){
  const mc=document.getElementById('main-area');
  const existCmp=document.getElementById('cmp-view');
  if(existCmp) existCmp.remove();
  document.getElementById('plot-col').style.display='none';
  const cmp=document.createElement('div');
  cmp.id='cmp-view';
  cmp.style.cssText='flex:1;display:flex;flex-direction:column;overflow:hidden';
  const grid=document.createElement('div');
  grid.className='cmp-grid'; grid.style.flex='1';
  Object.entries(COMPARE_SERIES).forEach(([key,series])=>{
    const lane=document.createElement('div');
    lane.className='cmp-lane';
    const hdr=document.createElement('div');
    hdr.className='cmp-lane-title';
    hdr.style.color=series.color;
    hdr.textContent=series.label;
    lane.appendChild(hdr);
    const papers=PAPERS.filter(p=>series.ids.includes(p.id)).sort((a,b)=>a.year-b.year);
    papers.forEach(p=>{
      const card=document.createElement('div');
      card.className='cmp-card'+(selectedId===p.id?' sel':'');
      const y=Math.floor(p.year);
      const citeStr=p.citations>=1000?(p.citations/1000).toFixed(1)+'K':p.citations;
      const stageBadge=STAGE_CFG[p.stage];
      card.innerHTML=`<div class="cmp-card-title">${p.name}</div><div class="cmp-card-meta">${y} · ${citeStr} citations</div><span class="cmp-tag" style="background:${stageBadge.color}22;color:${stageBadge.color};border:0.5px solid ${stageBadge.color}44">${stageBadge.name}</span>`;
      card.addEventListener('click',e=>{
        e.stopPropagation();
        selectedId=p.id;
        document.querySelectorAll('.cmp-card').forEach(c=>c.classList.remove('sel'));
        card.classList.add('sel');
        if(!panelOpen){panelOpen=true;document.getElementById('detail-col').classList.remove('collapsed');document.getElementById('tog-icon').className='ti ti-chevron-right';}
        const laneObj=getLanes().find(l=>l.id===key)||{label:series.label,short:series.label,color:series.color,fill:'#E6F1FB'};
        showDetail(p,laneObj);
      });
      lane.appendChild(card);
    });
    grid.appendChild(lane);
  });
  cmp.appendChild(grid);
  mc.insertBefore(cmp,document.getElementById('detail-col'));
}

function renderAll(){
  renderTopbar();
  renderLegend();
  if(currentView==='compare'){
    renderCompareView();
    return;
  }
  const pc=document.getElementById('plot-col');
  pc.style.display='flex';
  const cmpV=document.getElementById('cmp-view');
  if(cmpV) cmpV.remove();
  renderHeat();
  renderScatter();
}

document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView=btn.dataset.view;
    selectedId=null;
    document.getElementById('d-empty').style.display='flex';
    document.getElementById('d-open').style.display='none';
    renderAll();
  });
});

document.getElementById('col-toggle').addEventListener('click',()=>{
  panelOpen=!panelOpen;
  document.getElementById('detail-col').classList.toggle('collapsed',!panelOpen);
  document.getElementById('tog-icon').className=panelOpen?'ti ti-chevron-right':'ti ti-chevron-left';
  setTimeout(()=>{ if(currentView!=='compare') renderScatter(); },210);
});

document.getElementById('scatter-wrap').addEventListener('click',()=>{
  selectedId=null;
  document.getElementById('d-empty').style.display='flex';
  document.getElementById('d-open').style.display='none';
  if(currentView!=='compare') renderScatter();
});

window.addEventListener('resize',()=>{ if(currentView!=='compare'){ renderHeat(); renderScatter(); }});

requestAnimationFrame(()=>{
  document.getElementById('scatter-wrap').style.height='420px';
  renderAll();
});
</script>
