/* ── GLOBAL VIEW: Bubble Matrix ── */
function renderGlobal(){
  const pc=document.getElementById('plot-col'); pc.innerHTML='';

  const CELL=42, BUBBLE_MAX=18, RLABEL=148;
  const bmWrap=document.createElement('div'); bmWrap.className='bm-wrap';

  /* Quarter header */
  const qhdr=document.createElement('div'); qhdr.className='bm-qhdr';
  const rpad=document.createElement('div'); rpad.style.cssText=`width:${RLABEL}px;flex-shrink:0`; qhdr.appendChild(rpad);
  const cells=document.createElement('div'); cells.style.cssText='display:flex;gap:3px';
  QS.forEach(({y,q})=>{
    const d=document.createElement('div'); d.className='bm-qlabel';
    d.style.width=CELL+'px'; d.style.flexShrink='0';
    d.textContent=`Q${q}`; cells.appendChild(d);
  });
  qhdr.appendChild(cells); bmWrap.appendChild(qhdr);

  /* Year labels above Q header — simpler: add year separators */
  /* Rows */
  GTOPICS.forEach(topic=>{
    const papers=PAPERS.filter(p=>p.gtopic===topic.id);
    const row=document.createElement('div'); row.className='bm-row';
    const rl=document.createElement('div'); rl.className='bm-rlabel';
    rl.style.width=RLABEL+'px';
    rl.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${topic.fill};border:1px solid ${topic.color};margin-right:5px;vertical-align:middle"></span><span style="color:${topic.color}">${topic.label}</span>`;
    row.appendChild(rl);
    const cs=document.createElement('div'); cs.className='bm-cells';
    QS.forEach(({y,q})=>{
      const qPapers=papers.filter(p=>{
        const py=Math.floor(p.year);
        const pq=Math.min(4,Math.max(1,Math.round((p.year-py)*4)+1));
        return py===y&&pq===q;
      });
      const n=qPapers.length;
      const avgCit=n?Math.round(qPapers.reduce((s,p)=>s+p.cit,0)/n):0;
      const cell=document.createElement('div'); cell.className='bm-cell';
      cell.style.width=CELL+'px'; cell.style.height=CELL+'px';
      if(n>0){
        const r=Math.round(4+Math.min(n,6)/6*(BUBBLE_MAX-4));
        const opacity=Math.min(0.9,0.3+avgCit/6000*0.6);
        const bubble=document.createElement('div'); bubble.className='bm-bubble';
        bubble.style.cssText=`width:${r*2}px;height:${r*2}px;background:${topic.color};opacity:${opacity.toFixed(2)}`;
        cell.appendChild(bubble);
        cell.title=`${topic.label} · ${y}Q${q} · ${n}篇 · 均引用${avgCit}`;
        cell.addEventListener('click',e=>{
          e.stopPropagation();
          document.querySelectorAll('.bm-cell.sel').forEach(c=>c.classList.remove('sel'));
          cell.classList.add('sel');
          showPaperList(cell,qPapers,topic);
        });
      } else {
        const dot=document.createElement('div');
        dot.style.cssText=`width:4px;height:4px;border-radius:50%;background:var(--color-border-tertiary)`;
        cell.appendChild(dot);
      }
      cs.appendChild(cell);
    });
    row.appendChild(cs); bmWrap.appendChild(row);
  });
  pc.appendChild(bmWrap);

  /* Legend */
  const leg=document.createElement('div'); leg.className='bm-legend';
  leg.innerHTML='<span>气泡大小 = 论文数量</span><span style="margin-left:4px">颜色深浅 = 平均引用量</span>';
  const bubs=document.createElement('div'); bubs.className='bm-leg-bubbles';
  [{r:5,l:'1篇'},{r:9,l:'3篇'},{r:13,l:'5篇+'}].forEach(({r,l})=>{
    const s=document.createElement('span'); s.style.cssText='display:flex;align-items:center;gap:3px;font-size:10px;color:var(--color-text-tertiary)';
    s.innerHTML=`<span style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:var(--color-border-secondary);display:inline-block"></span>${l}`;
    bubs.appendChild(s);
  });
  leg.appendChild(bubs); pc.appendChild(leg);

  /* Year axis above — inject as first row */
  const yearRow=document.createElement('div'); yearRow.style.cssText=`display:flex;margin-bottom:2px`;
  const rpad2=document.createElement('div'); rpad2.style.cssText=`width:${RLABEL}px;flex-shrink:0`; yearRow.appendChild(rpad2);
  let prevY=null;
  QS.forEach(({y,q})=>{
    const d=document.createElement('div');
    d.style.cssText=`width:${CELL}px;flex-shrink:0;margin-right:3px;font-size:10px;font-weight:500;color:var(--color-text-secondary);text-align:center`;
    if(y!==prevY){d.textContent=y;prevY=y;}
    yearRow.appendChild(d);
  });
  bmWrap.insertBefore(yearRow, bmWrap.firstChild);
}

function showPaperList(anchor,papers,topic){
  const pl=document.getElementById('plist');
  if(activeBmCell===anchor&&pl.style.display==='block'){pl.style.display='none';activeBmCell=null;return;}
  activeBmCell=anchor;
  pl.innerHTML='';
  const title=document.createElement('div'); title.className='plist-title';
  title.textContent=`${topic.label} · ${papers.length}篇`; pl.appendChild(title);
  papers.forEach(p=>{
    const item=document.createElement('div'); item.className='plist-item';
    const citeStr=p.cit>=1000?(p.cit/1000).toFixed(1)+'K':p.cit;
    item.innerHTML=`<div class="plist-item-name">${p.name}</div><div class="plist-item-meta">${p.authors} · ${citeStr} citations</div>`;
    item.addEventListener('click',e=>{e.stopPropagation();pl.style.display='none';openPanel();showDetail(p);});
    pl.appendChild(item);
  });
  const rect=anchor.getBoundingClientRect();
  const appRect=document.querySelector('.app').getBoundingClientRect();
  let top=rect.bottom-appRect.top+4;
  let left=rect.left-appRect.left;
  pl.style.cssText=`display:block;top:${top}px;left:${left}px;max-height:240px;overflow-y:auto`;
}

/* ── TOPIC VIEW: Swim-lane scatter ── */
function renderTopic(){
  const pc=document.getElementById('plot-col'); pc.innerHTML='';
  const lanes=TOPIC_LANES[topic]||[];
  const papers=PAPERS.filter(p=>p.topic===topic);

  const scWrap=document.createElement('div'); scWrap.className='sc-wrap'; scWrap.id='sc-wrap';
  pc.appendChild(scWrap);

  const legRow=document.createElement('div'); legRow.className='sc-legend';
  lanes.forEach(l=>{
    const item=document.createElement('div'); item.className='sc-leg-item';
    item.innerHTML=`<span class="sc-leg-dot" style="background:${l.fill};border:1px solid ${l.color}"></span><span style="color:${l.color}">${l.label}</span>`;
    legRow.appendChild(item);
  });
  pc.appendChild(legRow);

  const YEAR_MIN=2022.5, YEAR_MAX=2026.6;
  const PAD={l:8, r:12, t:28, b:20};
  const LANE_H=100, LANE_GAP=16;
  const totalH=PAD.t+lanes.length*(LANE_H+LANE_GAP)+PAD.b;

  function getW(){return (document.getElementById('sc-wrap')||scWrap).getBoundingClientRect().width||500;}
  function xSc(y){const W=getW();return PAD.l+(y-YEAR_MIN)/(YEAR_MAX-YEAR_MIN)*(W-PAD.l-PAD.r);}
  function laneY(i){return PAD.t+i*(LANE_H+LANE_GAP);}
  function citeR(c){return c>4000?11:c>1500?9:c>500?7:c>100?5.5:4.5;}
  function svgEl(t,a){const el=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a||{}).forEach(([k,v])=>el.setAttribute(k,v));return el;}

  /* Jitter: within a lane, papers at same Q get small vertical spread */
  function paperY(p,laneIdx){
    const sameLaneQ=papers.filter(q=>q.tlane===p.tlane&&Math.round(q.year*4)===Math.round(p.year*4));
    const idx=sameLaneQ.indexOf(p);
    const spread=(sameLaneQ.length-1)*14;
    const baseY=laneY(laneIdx)+LANE_H/2;
    return baseY-spread/2+idx*14;
  }

  function draw(){
    scWrap.innerHTML='';
    const W=getW();
    const svg=svgEl('svg',{viewBox:`0 0 ${W} ${totalH}`,height:totalH,width:'100%'});
    svg.style.display='block';

    const defs=svgEl('defs');
    defs.innerHTML=`<marker id="tarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>`;
    svg.appendChild(defs);

    /* Year lines */
    const gBg=svgEl('g');
    for(let y=2023;y<=2026;y++){
      const x=xSc(y);
      gBg.appendChild(svgEl('line',{x1:x,x2:x,y1:PAD.t-8,y2:totalH-PAD.b,stroke:'var(--color-border-tertiary)','stroke-width':'0.5'}));
      const t=svgEl('text',{x,y:PAD.t-10,'text-anchor':'middle','font-size':'10',fill:'var(--color-text-tertiary)'}); t.textContent=y; gBg.appendChild(t);
    }
    const nowX=xSc(2026.38);
    gBg.appendChild(svgEl('line',{x1:nowX,x2:nowX,y1:PAD.t-8,y2:totalH-PAD.b,stroke:'rgba(220,70,70,0.4)','stroke-width':'1','stroke-dasharray':'3,3'}));
    const nt=svgEl('text',{x:nowX+3,y:PAD.t-10,'font-size':'9',fill:'rgba(220,70,70,0.8)'}); nt.textContent='NOW'; gBg.appendChild(nt);
    svg.appendChild(gBg);

    /* Lane bands */
    lanes.forEach((l,i)=>{
      const y0=laneY(i), y1=y0+LANE_H;
      const band=svgEl('rect',{x:PAD.l,y:y0,width:W-PAD.l-PAD.r,height:LANE_H,fill:l.fill,opacity:'0.08',rx:'4'});
      svg.appendChild(band);
      const lt=svgEl('text',{x:PAD.l+6,y:y0+14,'font-size':'10','font-weight':'500',fill:l.color}); lt.textContent=l.label; svg.appendChild(lt);
      svg.appendChild(svgEl('line',{x1:PAD.l,x2:W-PAD.r,y1:y0,y2:y0,stroke:l.color,'stroke-width':'0.5',opacity:'0.2'}));
      svg.appendChild(svgEl('line',{x1:PAD.l,x2:W-PAD.r,y1:y1,y2:y1,stroke:l.color,'stroke-width':'0.5',opacity:'0.1'}));
    });

    /* Edges */
    const gE=svgEl('g');
    papers.forEach(pa=>{
      const liA=lanes.findIndex(l=>l.id===pa.tlane); if(liA<0) return;
      (pa.evol||[]).forEach((estr,ei)=>{
        const tname=estr.split('→').pop().trim().replace(/（.*）/g,'').trim();
        const pb=papers.find(p=>p.name.replace(/\s*\(.*\)/,'').includes(tname)||tname.includes(p.name.split(' ')[0]));
        if(!pb||pb.id===pa.id) return;
        const liB=lanes.findIndex(l=>l.id===pb.tlane); if(liB<0) return;
        const x1=xSc(pa.year),y1=paperY(pa,liA);
        const x2=xSc(pb.year),y2=paperY(pb,liB);
        const cross=liA!==liB;
        const mx=(x1+x2)/2;
        const path=svgEl('path',{d:`M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`,fill:'none',stroke:pa.evolC?.[ei]||lanes[liA].color,'stroke-width':cross?'1.2':'0.8','stroke-opacity':cross?'0.25':'0.2','stroke-dasharray':cross?'4 3':'none','marker-end':'url(#tarr)'});
        gE.appendChild(path);
      });
    });
    svg.appendChild(gE);

    /* Nodes */
    const tt=document.createElement('div'); tt.className='tt'; scWrap.appendChild(tt);
    const gN=svgEl('g');
    papers.forEach(p=>{
      const li=lanes.findIndex(l=>l.id===p.tlane); if(li<0) return;
      const l=lanes[li];
      const cx=xSc(p.year), cy=paperY(p,li), r=citeR(p.cit);
      const grp=svgEl('g'); grp.style.cursor='pointer';
      if(selId===p.id){grp.appendChild(svgEl('circle',{cx,cy,r:r+4,fill:'none',stroke:l.color,'stroke-width':'0.8','stroke-opacity':'0.5'}));}
      const circle=svgEl('circle',{cx,cy,r,fill:l.fill,stroke:l.color,'stroke-width':selId===p.id?'2.5':'1'});
      grp.appendChild(circle);
      grp.addEventListener('mouseenter',e=>{
        if(selId!==p.id) circle.setAttribute('stroke-width','2');
        const lbl=svgEl('text',{x:cx+r+3,y:cy+1,'dominant-baseline':'middle','font-size':'9.5',fill:'var(--color-text-primary)','class':'hl'});
        lbl.textContent=p.name; grp.appendChild(lbl);
        tt.style.display='block';
        tt.innerHTML=`<div class="ttt">${p.name}</div><div class="ttm">${p.authors} · ${p.cit>=1000?(p.cit/1000).toFixed(1)+'K':p.cit} citations</div>`;
      });
      grp.addEventListener('mousemove',e=>{
        const rect=scWrap.getBoundingClientRect();
        let tx=e.clientX-rect.left+12,ty=e.clientY-rect.top-38;
        if(tx+210>rect.width) tx=e.clientX-rect.left-210;
        tt.style.left=tx+'px'; tt.style.top=ty+'px';
      });
      grp.addEventListener('mouseleave',()=>{
        if(selId!==p.id) circle.setAttribute('stroke-width','1');
        grp.querySelectorAll('.hl').forEach(l=>l.remove());
        tt.style.display='none';
      });
      grp.addEventListener('click',e=>{
        e.stopPropagation(); selId=p.id; openPanel(); draw(); showDetail(p);
      });
      gN.appendChild(grp);
    });
    svg.appendChild(gN);
    scWrap.appendChild(svg);
  }
  draw();
  window.addEventListener('resize',draw);
}

/* ── COMPARE VIEW ── */
function renderCompare(){
  const pc=document.getElementById('plot-col'); pc.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='cmp-wrap';
  Object.entries(CMP_SERIES).forEach(([key,series])=>{
    const lane=document.createElement('div'); lane.className='cmp-lane';
    const hdr=document.createElement('div'); hdr.className='cmp-lhdr';
    hdr.innerHTML=`<div class="cmp-ltitle" style="color:${series.color}">${series.label}</div><div class="cmp-lsub">${series.sub}</div>`;
    lane.appendChild(hdr);
    const scroll=document.createElement('div'); scroll.className='cmp-scroll';
    const ps=PAPERS.filter(p=>series.ids.includes(p.id)).sort((a,b)=>a.year-b.year);
    ps.forEach(p=>{
      const sc=STAGE[p.stage];
      const card=document.createElement('div'); card.className='cmp-card'+(selId===p.id?' sel':'');
      const cstr=p.cit>=1000?(p.cit/1000).toFixed(1)+'K':p.cit;
      card.innerHTML=`<div class="cmp-card-title">${p.name}</div><div class="cmp-card-meta">${Math.floor(p.year)} · ${cstr} citations</div><span class="stag" style="background:${sc.c}22;color:${sc.c};border:0.5px solid ${sc.c}44">${sc.n}</span>`;
      card.addEventListener('click',e=>{
        e.stopPropagation(); selId=p.id;
        document.querySelectorAll('.cmp-card').forEach(c=>c.classList.remove('sel')); card.classList.add('sel');
        openPanel(); showDetail(p);
      });
      scroll.appendChild(card);
    });
    lane.appendChild(scroll); wrap.appendChild(lane);
  });
  pc.appendChild(wrap);
}

/* ── Topbar ── */
function renderTopbar(){
  const tbr=document.getElementById('tbr'); tbr.innerHTML='';
  if(view==='topic'){
    [{id:'lin',l:'线性化架构'},{id:'infer',l:'推理效率'},{id:'moe',l:'MoE规模化'}].forEach(c=>{
      const b=document.createElement('button'); b.className='chip'+(topic===c.id?' active':'');
      b.textContent=c.l;
      b.addEventListener('click',()=>{topic=c.id;selId=null;renderAll();});
      tbr.appendChild(b);
    });
  }
}

function renderAll(){
  renderTopbar();
  if(view==='global') renderGlobal();
  else if(view==='topic') renderTopic();
  else renderCompare();
}

/* ── Events ── */
document.querySelectorAll('.vbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); view=btn.dataset.v; selId=null;
    document.getElementById('demp').style.display='flex';
    document.getElementById('dopn').classList.remove('show');
    document.getElementById('plist').style.display='none';
    renderAll();
  });
});
document.getElementById('dtog').addEventListener('click',()=>{
  panelOpen=!panelOpen;
  document.getElementById('det-col').classList.toggle('coll',!panelOpen);
  document.getElementById('togico').className=panelOpen?'ti ti-chevron-right':'ti ti-chevron-left';
  setTimeout(()=>{if(view==='topic') renderTopic();},210);
});
document.addEventListener('click',()=>{document.getElementById('plist').style.display='none'; activeBmCell=null; document.querySelectorAll('.bm-cell.sel').forEach(c=>c.classList.remove('sel'));});

requestAnimationFrame(renderAll);
</script>
