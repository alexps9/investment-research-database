<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LLM Architecture Radar v6</title>
<style>
:root {
  --color-text-primary: #333;
  --color-text-secondary: #666;
  --color-text-tertiary: #999;
  --color-background-primary: #fff;
  --color-background-secondary: #f5f5f5;
  --color-border-primary: #333;
  --color-border-secondary: #ddd;
  --color-border-tertiary: #eee;
  --color-text-info: #185FA5;
  --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary)}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;border-bottom:1px solid var(--color-border-tertiary)}
.view-btn{font-size:12px;padding:8px 14px;border:none;border-right:1px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.view-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.view-btn:hover:not(.active){background:var(--color-background-secondary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 10px}
.filter-chip{font-size:11px;padding:3px 8px;border:1px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer}
.filter-chip.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.main{display:flex;flex:1;min-height:400px}
.plot-col{flex:1;min-width:0;display:flex;flex-direction:column}
.heat-wrap{border-bottom:1px solid var(--color-border-tertiary);padding:8px 12px 6px}
.heat-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:4px;letter-spacing:.06em}
.scatter-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
svg.scatter{display:block}
.detail-col{width:240px;border-left:1px solid var(--color-border-tertiary);overflow-y:auto}
.detail-col.collapsed{width:0;overflow:hidden}
.d-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--color-text-tertiary);font-size:11px;text-align:center;padding:20px}
.d-open{display:none;flex-direction:column;height:100%}
.d-hdr{padding:12px;border-bottom:1px solid var(--color-border-tertiary)}
.d-title{font-size:13px;font-weight:500;margin-bottom:4px}
.d-sub{font-size:11px;color:var(--color-text-secondary)}
.d-body{padding:10px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.sl{font-size:10px;font-weight:500;letter-spacing:.07em;color:var(--color-text-tertiary);text-transform:uppercase;margin-bottom:4px}
.summary-txt{font-size:11px;color:var(--color-text-secondary);line-height:1.6}
.badge-row{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border-secondary)}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mc{background:var(--color-background-secondary);border-radius:4px;padding:6px 7px}
.mc-val{font-size:14px;font-weight:500}
.mc-key{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.tt{position:absolute;pointer-events:none;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:4px;padding:6px 9px;font-size:11px;z-index:20;display:none;max-width:200px}
.tt-title{font-weight:500;margin-bottom:2px}
.tt-meta{color:var(--color-text-secondary)}
.legend-row{display:flex;gap:12px;flex-wrap:wrap;padding:6px 12px;border-top:1px solid var(--color-border-tertiary)}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.cmp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;flex:1}
.cmp-lane{border-right:1px solid var(--color-border-tertiary);padding:10px;display:flex;flex-direction:column;gap:6px}
.cmp-lane:last-child{border-right:none}
.cmp-lane-title{font-size:11px;font-weight:500;margin-bottom:4px}
.cmp-card{background:var(--color-background-secondary);border-radius:4px;padding:7px 8px;font-size:11px;cursor:pointer;border:1px solid transparent}
.cmp-card:hover{border-color:var(--color-border-secondary)}
.cmp-card.sel{border-color:var(--color-border-primary)}
.cmp-card-title{font-weight:500;margin-bottom:2px}
.cmp-card-meta{font-size:10px;color:var(--color-text-tertiary)}
.cmp-tag{display:inline-block;font-size:9px;padding:1px 4px;border-radius:2px;margin-top:3px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <button class="view-btn active" data-view="global">全局视图</button>
  <button class="view-btn" data-view="topic">单一主题</button>
  <button class="view-btn" data-view="compare">架构对比</button>
  <div class="topbar-right" id="topbar-right"></div>
</div>
<div class="main" id="main-area">
  <div class="plot-col" id="plot-col">
    <div class="heat-wrap" id="heat-wrap">
      <div class="heat-label">论文数量 · 时间热度</div>
      <div style="position:relative;height:50px"><canvas id="heat-chart"></canvas></div>
    </div>
    <div class="scatter-wrap" id="scatter-wrap">
      <svg class="scatter" id="scatter"></svg>
      <div class="tt" id="tt"><div class="tt-title" id="tt-t"></div><div class="tt-meta" id="tt-m"></div></div>
    </div>
    <div class="legend-row" id="legend-row"></div>
  </div>
  <div class="detail-col" id="detail-col">
    <div class="d-empty" id="d-empty">点击节点查看详情</div>
    <div class="d-open" id="d-open">
      <div class="d-hdr"><div class="d-title" id="d-title"></div><div class="d-sub" id="d-sub"></div></div>
      <div class="d-body">
        <div><div class="sl">摘要</div><div class="summary-txt" id="d-summary"></div></div>
        <div><div class="sl">分类</div><div class="badge-row" id="d-badges"></div></div>
        <div><div class="sl">关键指标</div><div class="m-grid" id="d-metrics"></div></div>
      </div>
    </div>
  </div>
</div>
</div>

<script id="app-logic">
let currentView='global',currentTopic='seq',selectedId=null,filterLane='all',heatChart=null;
const PAD={l:8,r:8,t:28,b:22};

function getLanes(){
  if(currentView==='global') return LANES_GLOBAL;
  if(currentView==='topic') return LANES_TOPIC[currentTopic];
  return [{id:'mamba',label:'Mamba系',color:'#185FA5',fill:'#B5D4F4'},{id:'rwkv',label:'RWKV系',color:'#3B6D11',fill:'#C0DD97'},{id:'transformer',label:'Transformer优化',color:'#BA7517',fill:'#FAC775'}];
}

function getPapers(){
  if(currentView==='global') return PAPERS.filter(p=>filterLane==='all'||p.lane===filterLane);
  if(currentView==='topic') return PAPERS.filter(p=>p.lane===currentTopic);
  const allIds=Object.values(COMPARE_SERIES).flatMap(s=>s.ids);
  return PAPERS.filter(p=>allIds.includes(p.id));
}

function paperLaneKey(p){
  if(currentView==='global') return p.lane;
  if(currentView==='topic'){
    if(p.sub==='seq-lin'&&p.school) return 'seq-lin-'+p.school;
    return p.sub;
  }
  for(const[k,s]of Object.entries(COMPARE_SERIES)){if(s.ids.includes(p.id))return k;}
  return null;
}

function getW(){return document.getElementById('scatter-wrap').clientWidth||600}
function getH(){
  const lanes=getLanes();
  return Math.max(320, lanes.length*60+PAD.t+PAD.b);
}
function xScale(year){const W=getW();return PAD.l+(year-2023)/(2026.5-2023)*(W-PAD.l-PAD.r)}
function yScale(i,total){const H=getH(),usable=H-PAD.t-PAD.b;return total===1?H/2:PAD.t+i*(usable/(total-1))}
function citeR(c){return c>4000?11:c>1500?9:c>600?7:c>200?6:5}

function svgEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

function renderTopbar(){
  const tr=document.getElementById('topbar-right');
  tr.innerHTML='';
  if(currentView==='global'){
    [{id:'all',label:'全部'},{id:'seq',label:'序列'},{id:'infer',label:'推理效率'},{id:'scale',label:'MoE'}].forEach(c=>{
      const b=document.createElement('button');
      b.className='filter-chip'+(filterLane===c.id?' active':'');
      b.textContent=c.label;
      b.onclick=()=>{filterLane=c.id;renderAll();};
      tr.appendChild(b);
    });
  }else if(currentView==='topic'){
    [{id:'seq',label:'序列&长上下文'},{id:'infer',label:'推理效率'},{id:'scale',label:'MoE'}].forEach(c=>{
      const b=document.createElement('button');
      b.className='filter-chip'+(currentTopic===c.id?' active':'');
      b.textContent=c.label;
      b.onclick=()=>{currentTopic=c.id;selectedId=null;renderAll();};
      tr.appendChild(b);
    });
  }
}

function renderLegend(){
  const row=document.getElementById('legend-row');
  row.innerHTML='';
  getLanes().forEach(l=>{
    const item=document.createElement('div');
    item.className='leg-item';
    item.innerHTML=`<span class="leg-dot" style="background:${l.fill};border:1px solid ${l.color}"></span><span>${l.label}</span>`;
    row.appendChild(item);
  });
}

function renderHeat(){
  const papers=getPapers();
  const lanes=getLanes();
  const datasets=lanes.map(l=>({
    label:l.label,
    data:QUARTERS.map(({y,q})=>papers.filter(p=>{
      if(paperLaneKey(p)!==l.id)return false;
      const iy=Math.floor(p.year),iq=Math.round((p.year-Math.floor(p.year))*4)+1;
      return iy===y&&iq===q;
    }).length),
    backgroundColor:l.fill,
    borderColor:l.color,
    borderWidth:0.5,
  }));
  if(heatChart)heatChart.destroy();
  heatChart=new Chart(document.getElementById('heat-chart'),{
    type:'bar',
    data:{labels:QUARTERS.map(({y,q})=>`${y}Q${q}`),datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{stacked:true,ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false},border:{display:false}},
        y:{stacked:true,display:false},
      },
      animation:{duration:200},
    }
  });
}

function renderScatter(){
  const W=getW(),H=getH();
  const svg=document.getElementById('scatter');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);
  svg.setAttribute('height',H);
  svg.innerHTML='';

  const lanes=getLanes();
  const papers=getPapers();

  // year grid + NOW line
  const gBg=svgEl('g');
  for(let y=2023;y<=2026;y++){
    const x=xScale(y);
    gBg.appendChild(svgEl('line',{x1:x,x2:x,y1:PAD.t-8,y2:H-PAD.b,stroke:'#eee','stroke-width':'1'}));
    const t=svgEl('text',{x,y:PAD.t-12,'text-anchor':'middle','font-size':'10',fill:'#999'});t.textContent=y;gBg.appendChild(t);
  }
  const nowX=xScale(2026.38);
  gBg.appendChild(svgEl('line',{x1:nowX,x2:nowX,y1:PAD.t-8,y2:H-PAD.b,stroke:'#FF4400','stroke-width':'1','stroke-dasharray':'3,3',opacity:'0.6'}));
  const nt=svgEl('text',{x:nowX+3,y:PAD.t-12,'font-size':'9',fill:'#FF4400'});nt.textContent='NOW';gBg.appendChild(nt);
  svg.appendChild(gBg);

  // lane labels + guide lines + sub-lane grouping
  const laneGroups={};
  if(currentView==='topic'&&currentTopic==='seq'){
    laneGroups['1-A 线性化']=[0,1,2,3];
    laneGroups['1-B 稀疏']=[4];
    laneGroups['1-C 位置']=[5];
  }

  lanes.forEach((l,i)=>{
    const y=yScale(i,lanes.length);
    const t=svgEl('text',{x:4,y:y+3,'font-size':'9.5',fill:l.color,'font-weight':'500'});
    t.textContent=l.label;
    svg.appendChild(t);
    svg.appendChild(svgEl('line',{x1:PAD.l,x2:W-PAD.r,y1:y,y2:y,stroke:l.color,'stroke-width':'0.5',opacity:'0.15'}));
  });

  // group background for 1-A schools
  if(currentView==='topic'&&currentTopic==='seq'){
    const y0=yScale(0,lanes.length)-18;
    const y3=yScale(3,lanes.length)+18;
    svg.appendChild(svgEl('rect',{x:0,y:y0,width:W,height:y3-y0,fill:'#185FA5',opacity:'0.02',rx:'2'}));
    // left bracket line
    svg.appendChild(svgEl('line',{x1:1,x2:1,y1:y0,y2:y3,stroke:'#185FA5','stroke-width':'2',opacity:'0.3'}));
  }

  // position map with Y-jitter for overlapping nodes
  const posMap={};
  const laneSlots={};
  papers.sort((a,b)=>a.year-b.year).forEach(p=>{
    const lk=paperLaneKey(p);
    const li=lanes.findIndex(l=>l.id===lk);
    if(li<0)return;
    const baseY=yScale(li,lanes.length);
    const x=xScale(p.year);
    const key=lk+'_'+Math.round(x/30);
    if(!laneSlots[key])laneSlots[key]=0;
    const idx=laneSlots[key];
    laneSlots[key]++;
    const offsets=[0,-12,12,-20,20];
    const jitter=offsets[idx]||idx*10;
    posMap[p.id]={x,y:baseY+jitter};
  });

  // connections
  const gE=svgEl('g');
  papers.forEach(pa=>{
    (pa.evol||[]).forEach(([fromId,toId])=>{
      const s=posMap[fromId],t=posMap[toId];
      if(!s||!t)return;
      const fromP=PAPERS.find(p=>p.id===fromId);
      const toP=PAPERS.find(p=>p.id===toId);
      const cross=fromP&&toP&&fromP.school!==toP.school;
      const mx=(s.x+t.x)/2;
      gE.appendChild(svgEl('path',{
        d:`M${s.x} ${s.y} C${mx} ${s.y} ${mx} ${t.y} ${t.x} ${t.y}`,
        fill:'none',
        stroke:cross?'#999':(fromP?.school?SCHOOLS[fromP.school]?.color:'#999'),
        'stroke-width':cross?'1':'1.2',
        'stroke-opacity':cross?'0.25':'0.4',
        'stroke-dasharray':cross?'4 3':'none',
      }));
    });
  });
  svg.appendChild(gE);

  // nodes
  const gN=svgEl('g');
  papers.forEach(p=>{
    const pos=posMap[p.id];
    if(!pos)return;
    const lk=paperLaneKey(p);
    const lane=lanes.find(l=>l.id===lk);
    if(!lane)return;
    const r=citeR(p.citations);
    const grp=svgEl('g');grp.style.cursor='pointer';

    const circle=svgEl('circle',{cx:pos.x,cy:pos.y,r,fill:lane.fill,stroke:lane.color,'stroke-width':selectedId===p.id?'2.5':'1'});
    if(selectedId===p.id){
      grp.appendChild(svgEl('circle',{cx:pos.x,cy:pos.y,r:r+4,fill:'none',stroke:lane.color,'stroke-width':'0.8',opacity:'0.4'}));
    }
    grp.appendChild(circle);

    grp.onmouseenter=e=>{
      circle.setAttribute('stroke-width','2');
      const tt=document.getElementById('tt');
      tt.style.display='block';
      document.getElementById('tt-t').textContent=p.name;
      document.getElementById('tt-m').textContent=`${p.authors} · ${p.citations.toLocaleString()} cites`;
    };
    grp.onmousemove=e=>{
      const rect=document.getElementById('scatter-wrap').getBoundingClientRect();
      const tt=document.getElementById('tt');
      tt.style.left=(e.clientX-rect.left+12)+'px';
      tt.style.top=(e.clientY-rect.top-30)+'px';
    };
    grp.onmouseleave=()=>{
      if(selectedId!==p.id)circle.setAttribute('stroke-width','1');
      document.getElementById('tt').style.display='none';
    };
    grp.onclick=e=>{
      e.stopPropagation();
      selectedId=p.id;
      renderScatter();
      showDetail(p,lane);
    };
    gN.appendChild(grp);

    // label only for top-tier papers (avoid clutter)
    if(p.citations>=2500||p.alpha==='High'){
      const lbl=svgEl('text',{x:pos.x+r+3,y:pos.y+3,'font-size':'8.5',fill:'#444','dominant-baseline':'middle'});
      lbl.textContent=p.name.length>12?p.name.slice(0,12):p.name;
      gN.appendChild(lbl);
    }
  });
  svg.appendChild(gN);
}

function showDetail(p,lane){
  document.getElementById('d-empty').style.display='none';
  const d=document.getElementById('d-open');d.style.display='flex';
  document.getElementById('d-title').textContent=p.name;
  document.getElementById('d-sub').textContent=p.authors;
  document.getElementById('d-summary').textContent=p.summary;
  const br=document.getElementById('d-badges');br.innerHTML='';
  const sb=document.createElement('span');sb.className='badge';sb.style.cssText=`background:${lane.fill};color:${lane.color}`;sb.textContent=lane.label;br.appendChild(sb);
  p.tags.forEach(t=>{const tg=document.createElement('span');tg.className='badge';tg.textContent='#'+t;br.appendChild(tg);});
  const mg=document.getElementById('d-metrics');mg.innerHTML='';
  [{k:'引用',v:p.citations>=1000?(p.citations/1000).toFixed(1)+'K':p.citations},{k:'年份',v:Math.floor(p.year)},{k:'Alpha',v:p.alpha},{k:'阶段',v:STAGE_CFG[p.stage].name}].forEach(m=>{
    const c=document.createElement('div');c.className='mc';
    c.innerHTML=`<div class="mc-val">${m.v}</div><div class="mc-key">${m.k}</div>`;
    mg.appendChild(c);
  });
}

function renderCompare(){
  document.getElementById('plot-col').style.display='none';
  let cmp=document.getElementById('cmp-view');
  if(cmp)cmp.remove();
  cmp=document.createElement('div');cmp.id='cmp-view';cmp.style.cssText='flex:1;display:flex;flex-direction:column';
  const grid=document.createElement('div');grid.className='cmp-grid';
  Object.entries(COMPARE_SERIES).forEach(([key,series])=>{
    const lane=document.createElement('div');lane.className='cmp-lane';
    const hdr=document.createElement('div');hdr.className='cmp-lane-title';hdr.style.color=series.color;hdr.textContent=series.label;
    lane.appendChild(hdr);
    PAPERS.filter(p=>series.ids.includes(p.id)).sort((a,b)=>a.year-b.year).forEach(p=>{
      const card=document.createElement('div');card.className='cmp-card'+(selectedId===p.id?' sel':'');
      const stg=STAGE_CFG[p.stage];
      card.innerHTML=`<div class="cmp-card-title">${p.name}</div><div class="cmp-card-meta">${Math.floor(p.year)} · ${p.citations>=1000?(p.citations/1000).toFixed(1)+'K':p.citations} cites</div><span class="cmp-tag" style="background:${stg.color}22;color:${stg.color}">${stg.name}</span>`;
      card.onclick=()=>{selectedId=p.id;document.querySelectorAll('.cmp-card').forEach(c=>c.classList.remove('sel'));card.classList.add('sel');showDetail(p,{label:series.label,color:series.color,fill:series.color+'33'});};
      lane.appendChild(card);
    });
    grid.appendChild(lane);
  });
  cmp.appendChild(grid);
  document.getElementById('main-area').insertBefore(cmp,document.getElementById('detail-col'));
}

function renderAll(){
  renderTopbar();
  renderLegend();
  if(currentView==='compare'){renderCompare();return;}
  document.getElementById('plot-col').style.display='flex';
  const cv=document.getElementById('cmp-view');if(cv)cv.remove();
  updateScatterHeight();
  renderHeat();
  renderScatter();
}

document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView=btn.dataset.view;
    selectedId=null;
    document.getElementById('d-empty').style.display='flex';
    document.getElementById('d-open').style.display='none';
    renderAll();
  };
});

document.getElementById('scatter-wrap').onclick=()=>{
  selectedId=null;
  document.getElementById('d-empty').style.display='flex';
  document.getElementById('d-open').style.display='none';
  if(currentView!=='compare')renderScatter();
};

window.onresize=()=>{if(currentView!=='compare'){renderHeat();renderScatter();}};

requestAnimationFrame(()=>{
  const sw=document.getElementById('scatter-wrap');
  sw.style.height=getH()+'px';
  sw.style.maxHeight=getH()+'px';
  renderAll();
});

function updateScatterHeight(){
  const sw=document.getElementById('scatter-wrap');
  const h=getH();
  sw.style.height=h+'px';
  sw.style.maxHeight=h+'px';
}
</script>

</html>
