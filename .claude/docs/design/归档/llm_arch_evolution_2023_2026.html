* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }

.root {
  font-family: var(--font-mono, 'Courier New', monospace);
  padding: 16px 0;
  background: transparent;
  color: var(--color-text-primary);
  --t-span: 36px;
  --lane-h: 96px;
  display: flex;
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 20px;
  padding: 0 16px;
}
.header h2 {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--color-text-secondary);
  cursor: pointer;
}
.leg-dot {
  width: 9px; height: 9px; border-radius: 50%;
}
.alpha-badge {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: .04em;
}
.alpha-high { background: rgba(239,159,39,.18); color: #BA7517; border: 0.5px solid rgba(239,159,39,.4); }
.alpha-mid  { background: rgba(55,138,221,.14); color: #185FA5; border: 0.5px solid rgba(55,138,221,.3); }
.alpha-low  { background: rgba(136,135,128,.12); color: #5F5E5A; border: 0.5px solid rgba(136,135,128,.25); }

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.canvas-wrap {
  position: relative;
  overflow-x: auto;
  padding-bottom: 4px;
  flex: 1;
}

.canvas {
  position: relative;
  /* width set by JS */
}

.year-bar {
  display: flex;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--color-background-primary);
  border-bottom: 0.5px solid var(--color-border-tertiary);
  margin-bottom: 0;
}
.year-cell {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-secondary);
  letter-spacing: .06em;
  text-align: center;
  padding: 6px 0;
  border-right: 0.5px solid var(--color-border-tertiary);
  flex-shrink: 0;
}
.quarter-bar {
  display: flex;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  margin-bottom: 8px;
}
.q-cell {
  font-size: 10px;
  color: var(--color-text-tertiary);
  text-align: center;
  padding: 3px 0;
  flex-shrink: 0;
  border-right: 0.5px solid var(--color-border-tertiary);
}

.lane {
  display: flex;
  align-items: stretch;
  margin-bottom: 4px;
  position: relative;
  min-height: 90px;
}
.lane-label {
  width: 128px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 8px 10px 8px 16px;
  border-right: 0.5px solid var(--color-border-tertiary);
  position: sticky;
  left: 0;
  background: var(--color-background-primary);
  z-index: 5;
}
.lane-name {
  font-size: 11px;
  font-weight: 500;
  line-height: 1.3;
  color: var(--color-text-primary);
}
.lane-sub {
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
  line-height: 1.3;
}
.lane-track {
  position: relative;
  flex: 1;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.lane-track::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  border-top: 0.5px dashed var(--color-border-tertiary);
  opacity: 0.5;
}

/* Node */
.node {
  position: absolute;
  cursor: pointer;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 4;
}
.node-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid;
  flex-shrink: 0;
  transition: transform .15s;
  position: relative;
  z-index: 2;
}
.node:hover .node-dot { transform: scale(1.5); }
.node-label {
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  margin-top: 3px;
  color: var(--color-text-primary);
  text-align: center;
  max-width: 100px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node-arxiv {
  font-size: 9px;
  color: var(--color-text-tertiary);
  white-space: nowrap;
}

/* Connector arrows */
.conn-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}

/* Detail panel - sidebar */
.detail {
  position: fixed;
  top: 0; right: 0;
  width: 360px;
  height: 100vh;
  background: var(--color-background-primary);

  z-index: 100;

  font-size: 12px;

.detail-header {

  border-bottom: 0.5px solid var(--color-border-tertiary);

}

  position: absolute; top: 16px; right: 20px;

  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: background 0.2s;
}
.detail-close:hover { background: rgba(0,0,0,.04); color: var(--color-text-primary); }

.detail-section {
  margin-bottom: 24px;
}
.detail-section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  margin-bottom: 10px;
}
.detail-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--color-text-primary);
  line-height: 1.3;
}
.detail-meta {
  color: var(--color-text-secondary);
  font-size: 12px;
  margin-bottom: 8px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.detail-meta-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: rgba(0,0,0,.04);
  border-radius: 3px;
  font-size: 11px;
}
.detail-body {
  color: var(--color-text-secondary);
  line-height: 1.6;
  font-size: 12px;
}
.detail-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tag {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 0.5px solid var(--color-border-secondary);
  color: var(--color-text-secondary);
  background: rgba(0,0,0,.02);
  cursor: pointer;
  transition: all 0.2s;
}
.tag:hover {
  background: rgba(0,0,0,.06);
  border-color: var(--color-border-primary);

.detail-link {

.detail-link:hover { color: #1E40AF; }

.detail-subsection {
  background: rgba(0,0,0,.02);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 6px;
  padding: 12px;

.detail-subsection-label {

.detail-subsection-content {

.detail-list {

.detail-list li {

.detail-list li::before {
  content: '·';

  margin-left: -8px;
  color: var(--color-text-tertiary);

/* Scrollbar styling */
.detail::-webkit-scrollbar { width: 4px; }
.detail::-webkit-scrollbar-track { background: transparent; }
.detail::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 2px; }
.detail::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.2); }

.now-line {

  background: rgba(239,91,48,.6);

.now-label {
  position: absolute;
  top: 4px;
  font-size: 9px;
  color: rgba(239,91,48,.9);
  font-weight: 500;
  transform: translateX(-50%);

/* Grid lines */
.grid-q {
  position: absolute;
  top: 0; bottom: 0;
  width: 0.5px;
  background: var(--color-border-tertiary);

/* Highlight band */
.band {
  position: absolute;
  top: 0; bottom: 0;
  background: rgba(239,159,39,.06);
  border-left: 1px solid rgba(239,159,39,.2);
  border-right: 1px solid rgba(239,159,39,.2);
  pointer-events: none;
}
</style>

// Quarters: index 0 = Q3 2023
function qIndex(year, q) { return (year - 2023) * 4 + (q - 3) + (year > 2023 ? (2023-2023)*0 : 0); }
function qToX(year, q) {
  // Q3 2023 = index 0
  const base = (year - 2023) * 4 + (q - 1);
  const off = 2; // starts at Q3
  return LANE_W + (base - off) * Q_W + Q_W/2;
}

const QUARTERS = [];
for (let y = 2023; y <= 2026; y++) {
  const qs = (y === 2023) ? [3,4] : (y === 2026) ? [1,2,3] : [1,2,3,4];
  qs.forEach(q => QUARTERS.push({ y, q }));
}

function qToXLocal(year, q) {
  const idx = QUARTERS.findIndex(e => e.y === year && e.q === q);
  if (idx < 0) return -1;
  return LANE_W + idx * Q_W + Q_W / 2;
}

// Render year bar
const yearBar = document.getElementById('year-bar');
const years = [2023, 2024, 2025, 2026];
const yearSpans = { 2023: 2, 2024: 4, 2025: 4, 2026: 3 };
// Sticky label col placeholder
const lPlaceholder = document.createElement('div');
lPlaceholder.style.cssText = `width:${LANE_W}px;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);`;
yearBar.appendChild(lPlaceholder);
years.forEach(y => {
  const d = document.createElement('div');
  d.className = 'year-cell';
  d.textContent = y;
  d.style.width = (yearSpans[y] * Q_W) + 'px';
  yearBar.appendChild(d);
});

// Quarter bar
const qBar = document.getElementById('q-bar');
const lPlaceholder2 = document.createElement('div');
lPlaceholder2.style.cssText = `width:${LANE_W}px;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);`;
qBar.appendChild(lPlaceholder2);
QUARTERS.forEach(({ y, q }) => {
  const d = document.createElement('div');
  d.className = 'q-cell';
  d.textContent = 'Q' + q;
  d.style.width = Q_W + 'px';
  qBar.appendChild(d);
});

// Canvas width
const canvas = document.getElementById('canvas');
canvas.style.width = (LANE_W + QUARTERS.length * Q_W) + 'px';

// "Now" line: May 2026 = Q2 2026
const nowIdx = QUARTERS.findIndex(e => e.y === 2026 && e.q === 2);
const nowX = LANE_W + nowIdx * Q_W + Q_W * 0.5;

// Highlight band: Hybrid 2025+ alpha zone
// from Q1 2025 to end
const bandStartIdx = QUARTERS.findIndex(e => e.y === 2025 && e.q === 1);
const bandX = LANE_W + bandStartIdx * Q_W;

// Legend
const legend = document.getElementById('legend');
const alphaMap = { high: 'alpha-high', mid: 'alpha-mid', low: 'alpha-low' };
const alphaLabel = { high: '🔥 HIGH', mid: '⚡ MID', low: '◇ LOW' };
[{a:'high',l:'High α'},{a:'mid',l:'Mid α'},{a:'low',l:'Low α'}].forEach(({a,l}) => {
  const el = document.createElement('div');
  el.className = 'leg-item';
  el.innerHTML = `<span class="alpha-badge ${alphaMap[a]}">${alphaLabel[a]}</span> <span>${l}</span>`;
  legend.appendChild(el);
});

// Render lanes
const container = document.getElementById('lanes-container');

STREAMS.forEach((stream, si) => {
  const lane = document.createElement('div');
  lane.className = 'lane';
  lane.style.minHeight = '100px';

  // Label
  const lbl = document.createElement('div');
  lbl.className = 'lane-label';
  lbl.innerHTML = `<div class="lane-name" style="color:${stream.color}">${stream.name}</div><div class="lane-sub">${stream.sub}</div><div class="alpha-badge ${alphaMap[stream.alpha]}" style="margin-top:4px;display:inline-block">${alphaLabel[stream.alpha]}</div>`;
  lane.appendChild(lbl);

  // Track
  const track = document.createElement('div');
  track.className = 'lane-track';
  track.style.position = 'relative';

  // Grid lines
  QUARTERS.forEach((_, qi) => {
    if (qi === 0) return;
    const gl = document.createElement('div');
    gl.className = 'grid-q';
    gl.style.left = (qi * Q_W) + 'px';
    track.appendChild(gl);
  });

  // Highlight band on hybrid lane
  if (stream.id === 'hybrid' || stream.id === 'inf') {
    const band = document.createElement('div');
    band.className = 'band';
    band.style.left = (bandStartIdx * Q_W) + 'px';
    band.style.right = '0';
    track.appendChild(band);
  }

  // Nodes
  const streamNodes = NODES.filter(n => n.stream === stream.id);

  // Stack nodes at same quarter
  const qMap = {};
  streamNodes.forEach(n => {
    const key = n.year + '_' + n.q;
    qMap[key] = (qMap[key] || 0) + 1;
  });
  const qUsed = {};

  streamNodes.forEach(n => {
    const idx = QUARTERS.findIndex(e => e.y === n.year && e.q === n.q);
    if (idx < 0) return;
    const x = idx * Q_W + Q_W / 2;
    const key = n.year + '_' + n.q;
    qUsed[key] = (qUsed[key] || 0);
    const stackOff = qUsed[key] * 26;
    qUsed[key]++;

    const nd = document.createElement('div');
    nd.className = 'node';
    nd.style.left = x + 'px';
    nd.style.top = (12 + stackOff) + 'px';

    const dot = document.createElement('div');
    dot.className = 'node-dot';
    dot.style.background = stream.fill;
    dot.style.borderColor = stream.color;
    if (n.alpha === 'high') {
      dot.style.boxShadow = `0 0 0 2px ${stream.color}33`;
      dot.style.width = '12px';
      dot.style.height = '12px';
    }

    const lbl = document.createElement('div');
    lbl.className = 'node-label';
    lbl.textContent = n.name;
    lbl.style.color = stream.color;

    const arxiv = document.createElement('div');
    arxiv.className = 'node-arxiv';
    arxiv.textContent = n.arxiv.startsWith('2') ? n.arxiv.slice(0,9) : '';

    nd.appendChild(dot);
    nd.appendChild(lbl);
    nd.appendChild(arxiv);

    nd.addEventListener('click', (e) => {
      e.stopPropagation();
      showDetail(n, stream);
    });

    track.appendChild(nd);
  });

  lane.appendChild(track);
  container.appendChild(lane);
});

// Now line (in each lane track - add to canvas wrapper)
const canvasWrap = document.getElementById('canvas-wrap');

// Add now line to canvas
const nowLine = document.createElement('div');
nowLine.className = 'now-line';
nowLine.style.left = nowX + 'px';
nowLine.style.top = '0';
nowLine.style.bottom = '0';
nowLine.style.position = 'absolute';
nowLine.style.pointerEvents = 'none';
canvas.style.position = 'relative';

const nowLbl = document.createElement('div');
nowLbl.className = 'now-label';
nowLbl.textContent = 'NOW';
nowLbl.style.left = nowX + 'px';
nowLbl.style.position = 'absolute';
nowLbl.style.top = '0';
canvas.appendChild(nowLine);
canvas.appendChild(nowLbl);

// Detail panel
function showDetail(node, stream) {
  const panel = document.getElementById('detail');

  // Title
  document.getElementById('d-title').textContent = node.name;

  // Meta
  const metaEl = document.getElementById('d-meta');
  metaEl.innerHTML = `
    <div class="detail-meta-item"><strong>${node.year}</strong> · Q${node.q}</div>
    <div class="detail-meta-item" style="background:${stream.color}15;color:${stream.color}">${stream.name}</div>
    <div class="detail-meta-item" style="background:${stream.color}10"><span class="alpha-badge ${alphaMap[node.alpha]}">${alphaLabel[node.alpha]}</span></div>
  `;

  // Description
  const bodySec = document.getElementById('d-body-section');
  if (node.desc) {
    document.getElementById('d-body').textContent = node.desc;
    bodySec.style.display = 'block';
  } else {
    bodySec.style.display = 'none';
  }

  // Tags
  const tagsSec = document.getElementById('d-tags-section');
  const tagsEl = document.getElementById('d-tags');
  if (node.tags && node.tags.length > 0) {
    tagsEl.innerHTML = '';
    node.tags.forEach(t => {
      const tg = document.createElement('span');
      tg.className = 'tag';
      tg.textContent = '#' + t;
      tagsEl.appendChild(tg);
    });
    tagsSec.style.display = 'block';
  } else {
    tagsSec.style.display = 'none';
  }

  // Stream info
  const streamSec = document.getElementById('d-stream-section');
  document.getElementById('d-stream').textContent = stream.name;
  document.getElementById('d-alpha').innerHTML = `<span class="alpha-badge ${alphaMap[node.alpha]}">${alphaLabel[node.alpha]}</span>`;
  streamSec.style.display = 'block';

  // Timeline
  const timeSec = document.getElementById('d-timeline-section');
  document.getElementById('d-date').textContent = `${node.year} Q${node.q}`;
  timeSec.style.display = 'block';

  // References
  const refSec = document.getElementById('d-ref-section');
  const linkEl = document.getElementById('d-link');
  if (node.arxiv && node.arxiv.match(/^\d{4}\.\d/)) {
    linkEl.href = 'https://arxiv.org/abs/' + node.arxiv;
    linkEl.innerHTML = 'View on arXiv: ' + node.arxiv + ' <span style="font-size:10px">↗</span>';
    refSec.style.display = 'block';
  } else {
    refSec.style.display = 'none';
  }

  panel.classList.add('open');
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
});
document.addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
});
</script>
</body>
</html>
