# Serves the static Next.js export (`out/`) for mainland-China users, so the app
# is reached over a domestic link instead of the GFW-throttled *.vercel.app edge.
# The browser calls the backend directly at http://<host>:8000 (NEXT_PUBLIC_API_URL
# baked into the build); CORS is allowed by the backend and both sides are plain
# HTTP, so there's no mixed-content issue.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Next static export emits "<route>.html" files (trailingSlash off). Try the
    # exact file, then the .html variant, then a directory index, finally fall
    # back to the SPA shell so client-side routing still works on deep links.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Hashed build assets are immutable — cache them hard.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
