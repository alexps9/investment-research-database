# LiteLLM proxy. Primary: AWS Bedrock (Claude) via the overseas SS proxy.
# Fallback: DeepSeek-V4 official API (China-direct, no proxy) so Q&A keeps
# working even when the proxy node or Bedrock is unavailable.
# Exposes an OpenAI-compatible API so the backend (DEEPSEEK_BASE_URL) and
# agent (LLM_BASE_URL) use the same surface unchanged.
model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
  - model_name: claude-opus-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-east-1
  # Back-compat alias: existing configs default LLM_MODEL=deepseek-chat.
  - model_name: deepseek-chat
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
  # Fallback target: DeepSeek-V4 official API (direct, bypasses the proxy via NO_PROXY).
  # DeepSeek exposes deepseek-v4-pro / deepseek-v4-flash; use -pro for quality.
  - model_name: deepseek-v4
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_FALLBACK_API_KEY

litellm_settings:
  drop_params: true          # silently drop params Bedrock doesn't accept
  request_timeout: 120
  # Under multi-user bursts, transient Bedrock 429/5xx retry then fall back to
  # DeepSeek-V4 — spreads load across two providers instead of failing the run.
  num_retries: 2
  # If the primary Claude model errors (proxy down / Bedrock geo-block / 5xx),
  # automatically retry the request against DeepSeek-V4.
  fallbacks:
    - claude-sonnet-4-6: ["deepseek-v4"]
    - claude-opus-4-6: ["deepseek-v4"]
    - deepseek-chat: ["deepseek-v4"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
