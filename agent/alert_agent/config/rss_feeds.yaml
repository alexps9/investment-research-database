# RSS feeds for company / lab official channels.
# Used by src/hh_research/collectors/rss_collector.py.
#
# Each entry:
#   - name: display name (used as author_name in signals)
#   - url: feed URL
#   - category: "company" | "university" | "other"
#   - track: optional default track for items from this feed (overridden by extractor)
#
# To add a feed: verify it returns 200 with RSS/Atom content via:
#   curl -A "Mozilla/5.0" -L <url>
# Then add an entry below.

feeds:
  # ---- Companies ----
  - name: OpenAI
    url: https://openai.com/news/rss.xml
    category: company

  - name: Google DeepMind
    url: https://deepmind.google/blog/rss.xml
    category: company

  - name: Google Research
    url: https://research.google/blog/rss/
    category: company

  - name: Meta Engineering
    url: https://engineering.fb.com/feed/
    category: company

  - name: Microsoft Research
    url: https://www.microsoft.com/en-us/research/feed/
    category: company

  - name: NVIDIA Blog
    url: https://blogs.nvidia.com/feed/
    category: company

  - name: Apple ML Research
    url: https://machinelearning.apple.com/rss.xml
    category: company

  - name: Together AI
    url: https://www.together.ai/blog/rss.xml
    category: company

  - name: Sakana AI
