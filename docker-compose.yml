version: '3.9'

# =============================================================================
# 两种启动模式：
#
#   [EC2 / AWS 托管服务]  直接连 RDS + ElastiCache + S3，不启动本地 DB/缓存：
#       docker compose up -d
#
#   [本地开发]  启动全部容器（含 postgres/redis/minio）：
#       docker compose --profile local up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 本地开发专用容器（仅 --profile local 时启动）
  # ---------------------------------------------------------------------------

  db:
    profiles: [local]
    # pgvector/pgvector 包含 vector 扩展，其余与 postgres:16 完全相同
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    profiles: [local]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    profiles: [local]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    profiles: [local]
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/hh-research &&
      mc anonymous set download local/hh-research;
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # 应用服务（两种模式都会启动）
  # ---------------------------------------------------------------------------

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        required: false   # AWS 模式下 db 未启动时不阻塞
      redis:
        condition: service_healthy
        required: false
      minio:
        condition: service_healthy
        required: false
    volumes:
      - ./backend:/app
    # seed.py 只需首次初始化时手动执行一次：
    #   docker compose exec backend python seed.py
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

  mcp:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      KB_API_BASE_URL: http://backend:8000
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8765
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
