services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paper-analysis-backend
    image: paper-analysis-backend:latest
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - OPENALEX_USER_AGENT=${OPENALEX_USER_AGENT:-AcademicPaperAnalysis/1.0}
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000
    container_name: paper-analysis-frontend
    image: paper-analysis-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  app-network:
    driver: bridge
